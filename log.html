<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>The Grind – Today's Log</title>
  <style>
    :root {
      --bg: #0d0e10;
      --card: #191b21;
      --card2: #21232a;
      --border: rgba(255,255,255,0.08);
      --text: #f0f0f0;
      --dim: #7a808e;
      --accent: #3b82f6;
      --green: #22c55e;
      --red: #ef4444;
      --rose: #fb7185;
      --rose-glow: rgba(251,113,133,0.12);
      --rose-border: rgba(251,113,133,0.22);
    }
    * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      background: var(--bg); color: var(--text);
      max-width: 480px; margin: 0 auto;
      height: 100vh; display: flex; flex-direction: column; overflow: hidden;
    }

    /* ---- Header ---- */
    .header {
      background: rgba(13,14,16,0.97);
      border-bottom: 1px solid var(--border);
      padding: 12px 16px;
      display: flex; justify-content: space-between; align-items: center;
      backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
      flex-shrink: 0;
    }
    .header-left { display: flex; align-items: center; gap: 10px; }
    .back-btn {
      background: none; border: none; color: var(--dim);
      font-size: 22px; cursor: pointer; padding: 2px 6px 2px 0; line-height: 1;
    }
    .header-title { font-size: 13px; font-weight: 900; letter-spacing: 3px; color: #c8ff00; }
    .header-sub {
      font-size: 11px; color: var(--rose); font-weight: 700;
      letter-spacing: 1px; margin-top: 1px;
    }
    .refresh-btn {
      background: none; border: 1px solid var(--border); border-radius: 8px;
      color: var(--dim); font-size: 15px; font-weight: 600;
      width: 32px; height: 32px; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
    }
    .refresh-btn:active { color: var(--text); border-color: var(--dim); }

    /* ---- Macro Summary Bar ---- */
    .macro-bar {
      background: var(--card); border-bottom: 1px solid var(--border);
      padding: 10px 16px; display: grid; grid-template-columns: 1fr 1fr 1fr;
      gap: 8px; flex-shrink: 0;
    }
    .macro-chip { text-align: center; }
    .mc-label { font-size: 8px; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; color: var(--dim); margin-bottom: 2px; }
    .mc-value { font-size: 17px; font-weight: 800; }
    .mc-value.protein  { color: #60a5fa; }
    .mc-value.calories { color: #fbbf24; }
    .mc-value.water    { color: var(--accent); }
    .mc-progress { height: 3px; background: var(--border); border-radius: 2px; margin-top: 4px; overflow: hidden; }
    .mc-fill { height: 100%; border-radius: 2px; transition: width 0.5s ease; }
    .mc-fill.protein  { background: #3b82f6; }
    .mc-fill.calories { background: #f59e0b; }
    .mc-fill.water    { background: var(--accent); }
    .mc-fill.hit      { background: var(--green); }

    /* ---- Day Navigation ---- */
    .day-nav {
      display: flex; justify-content: space-between; align-items: center;
      padding: 8px 16px; background: var(--card2); border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }
    .day-btn {
      background: var(--card); border: 1px solid var(--border); border-radius: 8px;
      color: var(--dim); font-size: 18px; width: 32px; height: 28px;
      cursor: pointer; display: flex; align-items: center; justify-content: center;
    }
    .day-btn:active { color: var(--text); border-color: var(--dim); }
    .day-btn:disabled { opacity: 0.25; }
    .day-label { font-size: 13px; font-weight: 700; }
    .day-sub { font-size: 10px; color: var(--dim); text-align: center; }

    /* ---- Log Area ---- */
    .log-area {
      flex: 1; overflow-y: auto; padding: 12px 14px;
      -webkit-overflow-scrolling: touch;
    }

    .log-item-card {
      background: var(--card2); border: 1px solid var(--border); border-left-width: 3px;
      border-radius: 10px; padding: 10px 12px; margin-bottom: 7px;
      display: flex; align-items: center; gap: 10px;
    }
    .log-item-card:last-child { margin-bottom: 0; }
    .log-item-icon { font-size: 18px; flex-shrink: 0; width: 26px; text-align: center; line-height: 1; }
    .log-item-body { flex: 1; min-width: 0; }
    .log-item-name { font-size: 13px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .log-item-meta { display: flex; gap: 5px; margin-top: 4px; flex-wrap: wrap; }
    .log-pill { font-size: 10px; font-weight: 700; padding: 2px 7px; border-radius: 5px; }
    .log-pill.protein  { background: rgba(59,130,246,0.15);  color: #60a5fa; }
    .log-pill.calories { background: rgba(245,158,11,0.15);  color: #fbbf24; }
    .log-pill.water    { background: rgba(59,130,246,0.12);  color: #93c5fd; }
    .log-item-right { display: flex; flex-direction: column; align-items: flex-end; gap: 6px; flex-shrink: 0; }
    .log-item-time { font-size: 10px; color: var(--dim); white-space: nowrap; }
    .log-del-btn {
      background: none; border: none; color: rgba(255,255,255,0.18);
      font-size: 14px; cursor: pointer; padding: 0; line-height: 1;
    }
    .log-del-btn:active { color: var(--red); }

    .log-date-header {
      font-size: 10px; font-weight: 700; text-transform: uppercase;
      letter-spacing: 1.5px; color: var(--dim); margin: 14px 0 8px;
    }
    .log-date-header:first-child { margin-top: 0; }

    .empty-state {
      text-align: center; padding: 40px 16px; color: var(--dim);
    }
    .empty-icon { font-size: 36px; margin-bottom: 10px; }
    .empty-text { font-size: 13px; line-height: 1.5; }

    .loading-state {
      text-align: center; padding: 40px 16px; color: var(--dim); font-size: 13px;
    }

    .count-badge {
      display: inline-block; background: var(--rose-glow); border: 1px solid var(--rose-border);
      color: var(--rose); font-size: 10px; font-weight: 700; padding: 2px 8px;
      border-radius: 10px; margin-left: 6px; vertical-align: middle;
    }
  </style>
</head>
<body>

<div class="header">
  <div class="header-left">
    <button class="back-btn" onclick="window.location.href='index.html'">&#8592;</button>
    <div>
      <div class="header-title">THE GRIND <span id="entryCount"></span></div>
      <div class="header-sub">TODAY'S LOG</div>
    </div>
  </div>
  <button class="refresh-btn" onclick="loadLog()" title="Refresh">&#8635;</button>
</div>

<div class="macro-bar">
  <div class="macro-chip">
    <div class="mc-label">Protein</div>
    <div class="mc-value protein" id="mcProtein">--</div>
    <div class="mc-progress"><div class="mc-fill protein" id="mcProtBar" style="width:0%"></div></div>
  </div>
  <div class="macro-chip">
    <div class="mc-label">Calories</div>
    <div class="mc-value calories" id="mcCalories">--</div>
    <div class="mc-progress"><div class="mc-fill calories" id="mcCalBar" style="width:0%"></div></div>
  </div>
  <div class="macro-chip">
    <div class="mc-label">Water</div>
    <div class="mc-value water" id="mcWater">--</div>
    <div class="mc-progress"><div class="mc-fill water" id="mcWaterBar" style="width:0%"></div></div>
  </div>
</div>

<div class="day-nav">
  <button class="day-btn" id="prevDayBtn" onclick="changeDay(-1)">&#8249;</button>
  <div style="text-align:center">
    <div class="day-label" id="dayLabel">Today</div>
    <div class="day-sub" id="daySub"></div>
  </div>
  <button class="day-btn" id="nextDayBtn" onclick="changeDay(1)" disabled>&#8250;</button>
</div>

<div class="log-area" id="logArea">
  <div class="loading-state">Loading...</div>
</div>

<script>
const API = 'https://script.google.com/macros/s/AKfycbzEcwU-CfMajZdxUVN2a823tPG85IOjhTK7_akWmkJ7oGvOM1Jt6RvbI2-RMwykECu_XQ/exec';

const DEFAULT_TARGETS = { protein: 190, calories: 2300, water: 128 };
function getTargets() {
  const raw = localStorage.getItem('grind_targets');
  return raw ? JSON.parse(raw) : { ...DEFAULT_TARGETS };
}
const targets = getTargets();

let viewOffset = 0;

function getDateStr() {
  const d = new Date(); d.setDate(d.getDate() + viewOffset);
  return d.toLocaleDateString('en-CA');
}

function updateDayNav() {
  const d = new Date(); d.setDate(d.getDate() + viewOffset);
  let label;
  if (viewOffset === 0) label = 'Today';
  else if (viewOffset === -1) label = 'Yesterday';
  else label = d.toLocaleDateString('en-US', { weekday: 'short', month: 'short', day: 'numeric' });
  document.getElementById('dayLabel').textContent = label;
  document.getElementById('daySub').textContent = getDateStr();
  document.getElementById('nextDayBtn').disabled = viewOffset >= 0;
}

function changeDay(delta) {
  viewOffset += delta;
  updateDayNav();
  loadLog();
}

async function loadLog() {
  document.getElementById('logArea').innerHTML = '<div class="loading-state">Loading...</div>';
  document.getElementById('entryCount').innerHTML = '';

  try {
    const dateParam = viewOffset !== 0 ? '&date=' + getDateStr() : '';
    const res = await fetch(API + '?action=getDaySummary' + dateParam);
    const data = await res.json();
    renderMacros(data.totals);
    renderLog(data.log);
  } catch (err) {
    document.getElementById('logArea').innerHTML = '<div class="empty-state"><div class="empty-icon">⚠️</div><div class="empty-text">Could not load log. Check your connection.</div></div>';
  }
}

function renderMacros(t) {
  const pPct = Math.min(100, ((t.protein  || 0) / targets.protein)  * 100);
  const cPct = Math.min(100, ((t.calories || 0) / targets.calories) * 100);
  const wPct = Math.min(100, ((t.waterOz  || 0) / targets.water)    * 100);
  const pHit = (t.protein  || 0) >= targets.protein;
  const wHit = (t.waterOz  || 0) >= targets.water;

  document.getElementById('mcProtein').textContent  = (t.protein  || 0) + 'g';
  document.getElementById('mcCalories').textContent = (t.calories || 0).toLocaleString();
  document.getElementById('mcWater').textContent    = (t.waterOz  || 0) + ' oz';

  const protBar = document.getElementById('mcProtBar');
  protBar.style.width = pPct + '%';
  protBar.className = 'mc-fill protein' + (pHit ? ' hit' : '');

  document.getElementById('mcCalBar').style.width = cPct + '%';

  const waterBar = document.getElementById('mcWaterBar');
  waterBar.style.width = wPct + '%';
  waterBar.className = 'mc-fill water' + (wHit ? ' hit' : '');
}

function renderLog(entries) {
  const area = document.getElementById('logArea');

  if (!entries || !entries.length) {
    area.innerHTML = `
      <div class="empty-state">
        <div class="empty-icon">📋</div>
        <div class="empty-text">Nothing logged yet.<br>Head back and use Quick Log or the FOOD tab.</div>
      </div>`;
    document.getElementById('entryCount').innerHTML = '';
    return;
  }

  const sorted = entries.slice().reverse();
  document.getElementById('entryCount').innerHTML = `<span class="count-badge">${sorted.length}</span>`;

  area.innerHTML = sorted.map(e => {
    const time = new Date(e.timestamp).toLocaleTimeString('en-US', { hour: 'numeric', minute: '2-digit' });
    const n = e.item.toLowerCase();
    let icon = '🍽️', borderColor = 'var(--border)';
    if (n.includes('coffee'))                             { icon = '☕'; borderColor = '#a8a29e'; }
    else if (n.includes('water'))                         { icon = '💧'; borderColor = '#3b82f6'; }
    else if (n.includes('coors') || n.includes('beer'))   { icon = '🍺'; borderColor = '#fbbf24'; }
    else if (n.includes('bourbon') || n.includes('whiskey')) { icon = '🥃'; borderColor = '#f87171'; }
    else if (e.protein >= 35)                             { icon = '🥩'; borderColor = '#22c55e'; }
    else if (e.protein > 0)                               { icon = '🍗'; borderColor = '#4ade80'; }

    const pills = [
      e.protein  > 0 ? `<span class="log-pill protein">${e.protein}p</span>`   : '',
      e.calories > 0 ? `<span class="log-pill calories">${e.calories} cal</span>` : '',
      (e.type === 'water') ? `<span class="log-pill water">${e.servings} oz</span>` : ''
    ].join('');

    const ts = String(e.timestamp).replace(/"/g, '&quot;');
    return `
      <div class="log-item-card" style="border-left-color:${borderColor}">
        <div class="log-item-icon">${icon}</div>
        <div class="log-item-body">
          <div class="log-item-name">${e.item}</div>
          <div class="log-item-meta">${pills}</div>
        </div>
        <div class="log-item-right">
          <div class="log-item-time">${time}</div>
          <button class="log-del-btn" onclick="deleteEntry('${ts}')" title="Remove">&#10005;</button>
        </div>
      </div>`;
  }).join('');
}

async function deleteEntry(timestamp) {
  try {
    await fetch(API, {
      method: 'POST',
      headers: { 'Content-Type': 'text/plain;charset=utf-8' },
      body: JSON.stringify({ action: 'deleteLogEntry', timestamp })
    });
    await loadLog();
  } catch (err) {
    alert('Failed to delete entry.');
  }
}

updateDayNav();
loadLog();
</script>
</body>
</html>
