<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Daily Tracker</title>
<style>
  :root {
    --bg: #0f0f0f;
    --card: #1a1a1a;
    --border: #2a2a2a;
    --text: #e8e8e8;
    --dim: #888;
    --accent: #4fc3f7;
    --green: #66bb6a;
    --orange: #ffa726;
    --red: #ef5350;
    --coffee-bg: #5d4037;
    --water-bg: #1565c0;
    --coors-bg: #f9a825;
    --coors-text: #1a1a1a;
    --bourbon-bg: #bf360c;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
    background: var(--bg);
    color: var(--text);
    max-width: 480px;
    margin: 0 auto;
    padding: 16px;
    padding-bottom: 100px;
    min-height: 100vh;
  }

  h1 { font-size: 20px; font-weight: 700; margin-bottom: 16px; text-align: center; }
  h2 { font-size: 16px; font-weight: 600; margin: 20px 0 10px; color: var(--dim); text-transform: uppercase; letter-spacing: 1px; }

  /* --- Status Banner --- */
  .status-banner {
    text-align: center;
    padding: 8px;
    font-size: 12px;
    border-radius: 8px;
    margin-bottom: 12px;
    display: none;
  }
  .status-banner.loading { display: block; background: var(--border); color: var(--dim); }
  .status-banner.error { display: block; background: #3e1a1a; color: var(--red); }
  .status-banner.success { display: block; background: #1a3e1a; color: var(--green); }

  /* --- Daily Totals --- */
  .totals {
    background: var(--card);
    border-radius: 14px;
    padding: 16px;
    margin-bottom: 16px;
    border: 1px solid var(--border);
  }

  .macro-row { margin-bottom: 12px; }
  .macro-row:last-child { margin-bottom: 0; }

  .macro-header {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    margin-bottom: 4px;
  }

  .macro-label { font-size: 14px; font-weight: 600; }
  .macro-value { font-size: 22px; font-weight: 700; }
  .macro-target { font-size: 13px; color: var(--dim); }

  .progress-bar {
    height: 8px;
    background: var(--border);
    border-radius: 4px;
    overflow: hidden;
  }
  .progress-fill {
    height: 100%;
    border-radius: 4px;
    transition: width 0.3s ease;
  }

  .chips {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    margin-top: 12px;
  }

  .chip {
    background: var(--border);
    border-radius: 20px;
    padding: 6px 12px;
    font-size: 13px;
    font-weight: 500;
  }
  .chip span { font-weight: 700; }

  /* --- Quick Tap Buttons --- */
  .quick-taps {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    margin-bottom: 16px;
  }

  .tap-btn {
    border: none;
    border-radius: 14px;
    padding: 18px 12px;
    font-size: 17px;
    font-weight: 700;
    cursor: pointer;
    color: #fff;
    position: relative;
    overflow: hidden;
    transition: transform 0.1s;
    text-align: center;
  }
  .tap-btn:active { transform: scale(0.95); }
  .tap-btn:disabled { opacity: 0.5; }
  .tap-btn .sub { display: block; font-size: 12px; font-weight: 400; margin-top: 2px; opacity: 0.8; }

  .tap-coffee { background: var(--coffee-bg); }
  .tap-coors { background: var(--coors-bg); color: var(--coors-text); }
  .tap-coors .sub { color: var(--coors-text); }
  .tap-bourbon { background: var(--bourbon-bg); }

  .water-group {
    display: flex;
    gap: 8px;
  }
  .water-group .tap-btn {
    flex: 1;
    background: var(--water-bg);
    padding: 18px 8px;
    font-size: 15px;
  }

  /* flash animation */
  .tap-btn.flash::after {
    content: '';
    position: absolute;
    inset: 0;
    background: rgba(255,255,255,0.3);
    animation: flashOut 0.4s ease-out forwards;
  }
  @keyframes flashOut { to { opacity: 0; } }

  /* --- Food Library --- */
  .food-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 14px;
    margin-bottom: 8px;
  }

  .food-top {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 8px;
  }

  .food-name { font-size: 15px; font-weight: 600; flex: 1; }
  .food-serving { font-size: 12px; color: var(--dim); }
  .food-macros { font-size: 12px; color: var(--dim); margin-bottom: 10px; }

  .food-actions {
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .serving-btn {
    width: 36px;
    height: 36px;
    border-radius: 50%;
    border: 1px solid var(--border);
    background: var(--card);
    color: var(--text);
    font-size: 20px;
    font-weight: 600;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .serving-btn:active { background: var(--border); }

  .serving-count {
    font-size: 18px;
    font-weight: 700;
    width: 28px;
    text-align: center;
  }

  .log-food-btn {
    background: var(--green);
    color: #000;
    border: none;
    border-radius: 10px;
    padding: 10px 18px;
    font-size: 14px;
    font-weight: 700;
    cursor: pointer;
    margin-left: auto;
  }
  .log-food-btn:active { opacity: 0.8; }

  /* --- Add Food Form --- */
  .add-food-toggle {
    width: 100%;
    background: var(--card);
    border: 1px dashed var(--border);
    border-radius: 12px;
    padding: 14px;
    color: var(--accent);
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    text-align: center;
    margin-bottom: 8px;
  }

  .add-food-form {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 16px;
    display: none;
    margin-bottom: 8px;
  }
  .add-food-form.open { display: block; }

  .form-row {
    display: flex;
    gap: 8px;
    margin-bottom: 8px;
    flex-wrap: wrap;
  }

  .form-field {
    display: flex;
    flex-direction: column;
    flex: 1;
    min-width: 0;
  }
  .form-field.full { flex-basis: 100%; }

  .form-field label {
    font-size: 11px;
    color: var(--dim);
    margin-bottom: 3px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }

  .form-field input {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px;
    color: var(--text);
    font-size: 15px;
    width: 100%;
  }
  .form-field input:focus { outline: none; border-color: var(--accent); }

  .batch-toggle {
    display: flex;
    gap: 0;
    margin-bottom: 10px;
    border-radius: 8px;
    overflow: hidden;
    border: 1px solid var(--border);
  }
  .batch-toggle button {
    flex: 1;
    padding: 8px;
    border: none;
    background: var(--bg);
    color: var(--dim);
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
  }
  .batch-toggle button.active {
    background: var(--accent);
    color: #000;
  }

  .save-food-btn {
    width: 100%;
    background: var(--accent);
    color: #000;
    border: none;
    border-radius: 10px;
    padding: 12px;
    font-size: 15px;
    font-weight: 700;
    cursor: pointer;
    margin-top: 4px;
  }
  .save-food-btn:active { opacity: 0.8; }

  /* --- Today's Log --- */
  .log-entry {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 8px 0;
    border-bottom: 1px solid var(--border);
    font-size: 13px;
  }
  .log-entry:last-child { border-bottom: none; }
  .log-entry .log-time { color: var(--dim); font-size: 12px; width: 55px; flex-shrink: 0; }
  .log-entry .log-item { flex: 1; }
  .log-entry .log-macros { color: var(--dim); text-align: right; }

  .log-section {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 14px;
    margin-bottom: 8px;
    max-height: 300px;
    overflow-y: auto;
  }
</style>
</head>
<body>

<h1>Daily Tracker</h1>

<div class="status-banner" id="statusBanner"></div>

<!-- Daily Totals -->
<div class="totals">
  <div class="macro-row">
    <div class="macro-header">
      <span class="macro-label">Protein</span>
      <span><span class="macro-value" id="totalProtein">--</span><span class="macro-target"> / 180g</span></span>
    </div>
    <div class="progress-bar"><div class="progress-fill" id="proteinBar" style="width:0%;background:var(--accent)"></div></div>
  </div>
  <div class="macro-row">
    <div class="macro-header">
      <span class="macro-label">Calories</span>
      <span><span class="macro-value" id="totalCalories">--</span><span class="macro-target"> / 2,300</span></span>
    </div>
    <div class="progress-bar"><div class="progress-fill" id="calorieBar" style="width:0%;background:var(--orange)"></div></div>
  </div>
  <div class="chips">
    <div class="chip">Water: <span id="totalWater">0</span> oz</div>
    <div class="chip">Coffee: <span id="totalCoffee">0</span></div>
    <div class="chip">Coors: <span id="totalCoors">0</span></div>
    <div class="chip">Bourbon: <span id="totalBourbon">0</span></div>
  </div>
</div>

<!-- Quick Tap Liquid Buttons -->
<div class="quick-taps">
  <button class="tap-btn tap-coffee" onclick="tapLiquid('coffee', this)">Coffee<span class="sub">+1 cup (75 cal)</span></button>
  <div class="water-group">
    <button class="tap-btn" onclick="tapLiquid('water', this, 12)">Water<span class="sub">12 oz</span></button>
    <button class="tap-btn" onclick="tapLiquid('water', this, 24)">Water<span class="sub">24 oz</span></button>
  </div>
  <button class="tap-btn tap-coors" onclick="tapLiquid('coors', this)">Coors<span class="sub">+1 beer (102 cal)</span></button>
  <button class="tap-btn tap-bourbon" onclick="tapLiquid('bourbon', this)">Bourbon<span class="sub">+1 pour (97 cal)</span></button>
</div>

<!-- Food Library -->
<h2>Food Library</h2>
<div id="foodList"><div style="color:var(--dim);text-align:center;padding:20px 0;font-size:14px;">Loading foods...</div></div>

<button class="add-food-toggle" id="addFoodToggle" onclick="toggleAddFood()">+ Add New Food</button>

<div class="add-food-form" id="addFoodForm">
  <div class="form-row">
    <div class="form-field full">
      <label>Name / Description</label>
      <input type="text" id="newFoodName" placeholder="e.g. Chicken & Asparagus">
    </div>
  </div>
  <div class="form-row">
    <div class="form-field full">
      <label>Serving Label</label>
      <input type="text" id="newServingLabel" placeholder="e.g. 1 container" value="1 container">
    </div>
  </div>
  <div class="form-row">
    <div class="form-field">
      <label>Containers / Servings</label>
      <input type="number" id="newContainers" value="1" min="1">
    </div>
  </div>

  <div class="batch-toggle">
    <button class="active" onclick="setBatchMode(false, this)">Per Serving</button>
    <button onclick="setBatchMode(true, this)">Batch Total</button>
  </div>

  <div class="form-row">
    <div class="form-field"><label>Protein (g)</label><input type="number" id="newProtein" inputmode="decimal"></div>
    <div class="form-field"><label>Calories</label><input type="number" id="newCalories" inputmode="decimal"></div>
  </div>
  <div class="form-row">
    <div class="form-field"><label>Carbs (g)</label><input type="number" id="newCarbs" inputmode="decimal"></div>
    <div class="form-field"><label>Fat (g)</label><input type="number" id="newFat" inputmode="decimal"></div>
  </div>
  <div class="form-row">
    <div class="form-field"><label>Sugar (g)</label><input type="number" id="newSugar" inputmode="decimal"></div>
    <div class="form-field"><label>Sodium (mg)</label><input type="number" id="newSodium" inputmode="decimal"></div>
  </div>

  <button class="save-food-btn" onclick="saveNewFood()">Save to Library</button>
</div>

<!-- Today's Log -->
<h2>Today's Log</h2>
<div class="log-section" id="todayLog">
  <div style="color:var(--dim);text-align:center;padding:20px 0;font-size:14px;">Loading...</div>
</div>

<script>
// ---- Config ----
const API = 'https://script.google.com/macros/s/AKfycbzEcwU-CfMajZdxUVN2a823tPG85IOjhTK7_akWmkJ7oGvOM1Jt6RvbI2-RMwykECu_XQ/exec';

let foodsCache = [];
let isBatchMode = false;

// ---- API Helpers ----
async function apiGet(action) {
  const res = await fetch(API + '?action=' + action);
  return res.json();
}

async function apiPost(body) {
  const res = await fetch(API, {
    method: 'POST',
    headers: { 'Content-Type': 'text/plain;charset=utf-8' },
    body: JSON.stringify(body)
  });
  return res.json();
}

function showStatus(msg, type) {
  const el = document.getElementById('statusBanner');
  el.textContent = msg;
  el.className = 'status-banner ' + type;
  if (type === 'success') {
    setTimeout(() => { el.className = 'status-banner'; }, 2000);
  }
}

// ---- Load Data on Start ----
async function loadAll() {
  try {
    showStatus('Loading...', 'loading');
    const [foods, totals, log] = await Promise.all([
      apiGet('getFoods'),
      apiGet('getToday'),
      apiGet('getTodayLog')
    ]);
    foodsCache = foods;
    renderTotals(totals);
    renderFoods(foods);
    renderLog(log);
    document.getElementById('statusBanner').className = 'status-banner';
  } catch (err) {
    showStatus('Failed to connect to Sheet. Check your internet.', 'error');
    console.error(err);
  }
}

// ---- Quick Tap Liquids ----
async function tapLiquid(type, btn, amount) {
  // Flash immediately
  btn.classList.remove('flash');
  void btn.offsetWidth;
  btn.classList.add('flash');
  btn.disabled = true;

  try {
    await apiPost({ action: 'logLiquid', type: type, amount: amount || 1 });
    await refreshTotalsAndLog();
  } catch (err) {
    showStatus('Failed to log ' + type, 'error');
    console.error(err);
  } finally {
    btn.disabled = false;
  }
}

// ---- Log Food ----
async function logFood(foodId) {
  const food = foodsCache.find(f => f.id === foodId);
  if (!food) return;

  const servingsEl = document.getElementById('srv-' + foodId);
  const servings = parseInt(servingsEl.textContent);
  const logBtn = servingsEl.closest('.food-card').querySelector('.log-food-btn');
  logBtn.disabled = true;
  logBtn.textContent = '...';

  try {
    await apiPost({ action: 'logFood', foodId: foodId, servings: servings });
    servingsEl.textContent = '1';
    await refreshTotalsAndLog();
    showStatus('Logged ' + food.name + (servings > 1 ? ' x' + servings : ''), 'success');
  } catch (err) {
    showStatus('Failed to log food', 'error');
    console.error(err);
  } finally {
    logBtn.disabled = false;
    logBtn.textContent = 'Log';
  }
}

function adjustServing(foodId, delta) {
  const el = document.getElementById('srv-' + foodId);
  let val = parseInt(el.textContent) + delta;
  if (val < 1) val = 1;
  if (val > 10) val = 10;
  el.textContent = val;
}

// ---- Add New Food ----
function toggleAddFood() {
  document.getElementById('addFoodForm').classList.toggle('open');
}

function setBatchMode(batch, btn) {
  isBatchMode = batch;
  const buttons = btn.parentElement.querySelectorAll('button');
  buttons.forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
}

async function saveNewFood() {
  const name = document.getElementById('newFoodName').value.trim();
  if (!name) { alert('Enter a food name.'); return; }

  const containers = parseInt(document.getElementById('newContainers').value) || 1;

  const body = {
    action: 'addFood',
    name: name,
    servingLabel: document.getElementById('newServingLabel').value.trim() || '1 serving',
    containers: containers,
    isBatch: isBatchMode,
    protein: parseFloat(document.getElementById('newProtein').value) || 0,
    calories: parseFloat(document.getElementById('newCalories').value) || 0,
    carbs: parseFloat(document.getElementById('newCarbs').value) || 0,
    fat: parseFloat(document.getElementById('newFat').value) || 0,
    sugar: parseFloat(document.getElementById('newSugar').value) || 0,
    sodium: parseFloat(document.getElementById('newSodium').value) || 0
  };

  const saveBtn = document.querySelector('.save-food-btn');
  saveBtn.disabled = true;
  saveBtn.textContent = 'Saving...';

  try {
    const result = await apiPost(body);
    if (result.success) {
      foodsCache.push(result.food);
      renderFoods(foodsCache);
      // Reset form
      document.getElementById('newFoodName').value = '';
      document.getElementById('newProtein').value = '';
      document.getElementById('newCalories').value = '';
      document.getElementById('newCarbs').value = '';
      document.getElementById('newFat').value = '';
      document.getElementById('newSugar').value = '';
      document.getElementById('newSodium').value = '';
      document.getElementById('newContainers').value = '1';
      document.getElementById('addFoodForm').classList.remove('open');
      showStatus('Added ' + name + ' to library', 'success');
    } else {
      showStatus('Error: ' + (result.error || 'Unknown'), 'error');
    }
  } catch (err) {
    showStatus('Failed to save food', 'error');
    console.error(err);
  } finally {
    saveBtn.disabled = false;
    saveBtn.textContent = 'Save to Library';
  }
}

// ---- Refresh helpers ----
async function refreshTotalsAndLog() {
  try {
    const [totals, log] = await Promise.all([
      apiGet('getToday'),
      apiGet('getTodayLog')
    ]);
    renderTotals(totals);
    renderLog(log);
  } catch (err) {
    console.error('Refresh failed:', err);
  }
}

// ---- Rendering ----
function renderTotals(t) {
  document.getElementById('totalProtein').textContent = t.protein;
  document.getElementById('totalCalories').textContent = t.calories;
  document.getElementById('totalWater').textContent = t.waterOz;
  document.getElementById('totalCoffee').textContent = t.coffeeCount;
  document.getElementById('totalCoors').textContent = t.coorsCount;
  document.getElementById('totalBourbon').textContent = t.bourbonCount;

  const pPct = Math.min(100, (t.protein / 180) * 100);
  const cPct = Math.min(100, (t.calories / 2300) * 100);
  document.getElementById('proteinBar').style.width = pPct + '%';
  document.getElementById('calorieBar').style.width = cPct + '%';

  document.getElementById('calorieBar').style.background = t.calories > 2300 ? 'var(--red)' : 'var(--orange)';
  document.getElementById('proteinBar').style.background = t.protein >= 180 ? 'var(--green)' : 'var(--accent)';
}

function renderFoods(foods) {
  const container = document.getElementById('foodList');
  if (!foods.length) {
    container.innerHTML = '<div style="color:var(--dim);text-align:center;padding:20px 0;font-size:14px;">No foods in library yet.</div>';
    return;
  }
  // Filter out coffee from food list since it has its own button
  const filtered = foods.filter(f => f.id !== 'f006');
  container.innerHTML = filtered.map(f => `
    <div class="food-card">
      <div class="food-top">
        <span class="food-name">${f.name}</span>
        <span class="food-serving">${f.servingLabel}</span>
      </div>
      <div class="food-macros">${f.protein}p / ${f.calories}cal / ${f.carbs}c / ${f.fat}f per serving</div>
      <div class="food-actions">
        <button class="serving-btn" onclick="adjustServing('${f.id}',-1)">-</button>
        <span class="serving-count" id="srv-${f.id}">1</span>
        <button class="serving-btn" onclick="adjustServing('${f.id}',1)">+</button>
        <button class="log-food-btn" onclick="logFood('${f.id}')">Log</button>
      </div>
    </div>
  `).join('');
}

function renderLog(entries) {
  const container = document.getElementById('todayLog');

  if (!entries || entries.length === 0) {
    container.innerHTML = '<div style="color:var(--dim);text-align:center;padding:20px 0;font-size:14px;">Nothing logged yet today.</div>';
    return;
  }

  container.innerHTML = entries.slice().reverse().map(e => {
    const time = new Date(e.timestamp).toLocaleTimeString('en-US', { hour:'numeric', minute:'2-digit' });
    const macros = e.calories ? `${e.protein}p / ${e.calories}cal` : '';
    return `<div class="log-entry">
      <span class="log-time">${time}</span>
      <span class="log-item">${e.item}</span>
      <span class="log-macros">${macros}</span>
    </div>`;
  }).join('');
}

// ---- Init ----
loadAll();
</script>
</body>
</html>
