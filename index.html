<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>The Grind</title>
<!-- v12 -->
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="The Grind">
<meta name="theme-color" content="#0b1120">
<link rel="manifest" href="manifest.json">
<style>
  :root {
    --bg: #0b1120;
    --card: #111a2e;
    --card2: #162036;
    --border: #1e2d4a;
    --text: #e4e8f1;
    --dim: #6b7a99;
    --accent: #3b82f6;
    --accent-glow: rgba(59,130,246,0.22);
    --green: #22c55e;
    --green-glow: rgba(34,197,94,0.22);
    --orange: #f59e0b;
    --red: #ef4444;
    --lime: #a3e635;
    --lime-glow: rgba(163,230,53,0.18);
    --purple: #a78bfa;
    --purple-glow: rgba(167,139,250,0.18);
    --coffee-bg: linear-gradient(135deg, #5d4037, #8d6e63);
    --water-bg: linear-gradient(135deg, #1d4ed8, #3b82f6);
    --coors-bg: linear-gradient(135deg, #d97706, #f59e0b);
    --coors-text: #1a1a1a;
    --bourbon-bg: linear-gradient(135deg, #b91c1c, #dc2626);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
    background: var(--bg);
    color: var(--text);
    max-width: 480px;
    margin: 0 auto;
    padding: 10px 14px 96px;
    min-height: 100vh;
    -webkit-user-select: none;
    user-select: none;
  }

  /* ---- Header ---- */
  .header {
    display: grid;
    grid-template-columns: 34px 1fr 34px;
    align-items: center;
    margin-bottom: 14px;
    padding: 6px 0;
  }
  .header-center { text-align: center; }
  .header h1 {
    font-size: 22px;
    font-weight: 800;
    background: linear-gradient(135deg, #60a5fa, #a78bfa);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    letter-spacing: 0.5px;
    line-height: 1.1;
  }
  .header .date { font-size: 11px; color: var(--dim); margin-top: 1px; }
  .icon-btn {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 50%;
    width: 34px; height: 34px;
    color: var(--dim); font-size: 16px;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
  }
  .icon-btn:active { color: var(--accent); border-color: var(--accent); }
  .header-right { display: flex; justify-content: flex-end; }

  /* ---- Status Banner ---- */
  .status-banner {
    text-align: center; padding: 7px; font-size: 12px;
    border-radius: 10px; margin-bottom: 10px; display: none;
  }
  .status-banner.loading { display: block; background: var(--border); color: var(--dim); }
  .status-banner.error   { display: block; background: rgba(239,68,68,0.12); color: var(--red); }
  .status-banner.success { display: block; background: rgba(34,197,94,0.12); color: var(--green); }

  /* ---- Yesterday Feedback ---- */
  .feedback-card {
    background: rgba(59,130,246,0.04);
    border: 1px solid rgba(59,130,246,0.18);
    border-radius: 14px; padding: 11px 14px; margin-bottom: 12px; display: none;
  }
  .feedback-card.show { display: block; }
  .feedback-title {
    font-size: 10px; font-weight: 700; text-transform: uppercase;
    letter-spacing: 1px; color: var(--accent); margin-bottom: 7px;
  }
  .feedback-item { font-size: 12px; line-height: 1.6; color: var(--dim); padding: 2px 0; }
  .fi-icon { margin-right: 5px; }

  /* ---- Day Navigation ---- */
  .day-nav { display: flex; justify-content: space-between; align-items: center; margin-bottom: 9px; }
  .day-nav-btn {
    background: var(--card); border: 1px solid var(--border); border-radius: 10px;
    color: var(--dim); font-size: 18px; width: 36px; height: 32px;
    cursor: pointer; display: flex; align-items: center; justify-content: center;
  }
  .day-nav-btn:active { color: var(--accent); border-color: var(--accent); }
  .day-nav-btn:disabled { opacity: 0.2; }
  .day-nav-center { text-align: center; }
  .day-nav-date { font-size: 13px; font-weight: 700; }
  .day-nav-sub { font-size: 10px; color: var(--dim); }

  /* ---- Hero Stats Card ---- */
  .hero-card {
    background: var(--card); border: 1px solid var(--border);
    border-radius: 20px; padding: 16px 16px 14px; margin-bottom: 10px;
    box-shadow: 0 8px 32px rgba(0,0,0,0.4); transition: opacity 0.2s;
  }
  .hero-card.loading-day { opacity: 0.4; }
  .hero-main { display: flex; align-items: center; gap: 14px; margin-bottom: 12px; }

  /* Protein Ring */
  .ring-wrap { flex-shrink: 0; }
  .protein-ring { width: 108px; height: 108px; display: block; }
  .ring-track { fill: none; stroke: #1a2540; stroke-width: 9; }
  .ring-fill {
    fill: none; stroke-width: 9; stroke-linecap: round;
    stroke-dasharray: 263.9; stroke-dashoffset: 263.9;
    transform: rotate(-90deg); transform-origin: 50% 50%;
    transition: stroke-dashoffset 0.7s cubic-bezier(.4,0,.2,1);
  }

  /* Calorie panel */
  .cal-panel { flex: 1; min-width: 0; }
  .cal-label { font-size: 9px; font-weight: 700; text-transform: uppercase; letter-spacing: 1.2px; color: var(--dim); margin-bottom: 3px; }
  .cal-row { display: flex; align-items: baseline; gap: 4px; margin-bottom: 2px; }
  .cal-value { font-size: 32px; font-weight: 800; line-height: 1; }
  .cal-value.over { color: var(--red); }
  .cal-of { font-size: 12px; color: var(--dim); }
  .cal-bar-wrap { height: 7px; background: var(--border); border-radius: 4px; overflow: hidden; margin-bottom: 12px; }
  .cal-bar {
    height: 100%; border-radius: 4px; transition: width 0.6s ease;
    background: linear-gradient(90deg, #d97706, #fbbf24);
  }
  .cal-bar.over { background: linear-gradient(90deg, #b91c1c, #ef4444); }

  /* Mini stat row */
  .mini-row { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 6px; }
  .mini-stat {
    background: var(--card2); border: 1px solid var(--border);
    border-radius: 9px; padding: 7px 5px 6px; text-align: center;
  }
  .ms-label { font-size: 8px; color: var(--dim); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 2px; }
  .ms-value { font-size: 14px; font-weight: 800; }
  .ms-value.water  { color: var(--accent); }
  .ms-value.coffee { color: #a8a29e; }
  .ms-value.done   { color: var(--lime); }
  .ms-value.rest   { color: var(--dim); }

  /* Drink row */
  .drink-row { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; margin-top: 6px; }
  .drink-chip {
    background: var(--card2); border: 1px solid var(--border); border-radius: 9px;
    padding: 7px 10px; display: flex; justify-content: space-between; align-items: center;
  }
  .dc-label { font-size: 11px; color: var(--dim); font-weight: 600; }
  .dc-val { font-size: 17px; font-weight: 800; }
  .drink-chip.coors   .dc-val { color: #fbbf24; }
  .drink-chip.bourbon .dc-val { color: #f87171; }

  /* ---- Bodyweight Strip ---- */
  .weight-strip {
    display: flex; align-items: center; gap: 8px;
    background: var(--card); border: 1px solid var(--border); border-radius: 14px;
    padding: 10px 14px; margin-bottom: 12px; box-shadow: 0 2px 12px rgba(0,0,0,0.2);
  }
  .weight-strip.unlogged { border-color: var(--orange); }
  .weight-strip-label { font-size: 12px; font-weight: 600; color: var(--dim); flex: 1; white-space: nowrap; }
  .weight-strip.unlogged .weight-strip-label { color: var(--orange); }
  .weight-strip input {
    background: var(--bg); border: 1px solid var(--border); border-radius: 8px;
    padding: 7px 8px; color: var(--text); font-size: 16px; font-weight: 700;
    width: 78px; text-align: center; flex-shrink: 0;
  }
  .weight-strip input:focus { outline: none; border-color: var(--accent); }
  .weight-strip .unit { color: var(--dim); font-size: 11px; flex-shrink: 0; }
  .weight-save-btn {
    background: var(--accent); color: #fff; border: none; border-radius: 8px;
    padding: 7px 11px; font-size: 13px; font-weight: 700; cursor: pointer; flex-shrink: 0;
  }
  .weight-save-btn:active { transform: scale(0.95); }
  .weight-logged-badge { font-size: 11px; color: var(--green); white-space: nowrap; flex-shrink: 0; }

  /* ---- Section Headers ---- */
  h2 {
    font-size: 10px; font-weight: 700; margin: 18px 0 9px;
    color: var(--dim); text-transform: uppercase; letter-spacing: 1.5px;
  }

  /* ---- Quick Tap ---- */
  .quick-taps { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
  .tap-btn {
    border: none; border-radius: 14px; padding: 17px 10px;
    font-size: 15px; font-weight: 700; cursor: pointer; color: #fff;
    position: relative; overflow: hidden; transition: transform 0.1s; text-align: center;
    box-shadow: 0 4px 16px rgba(0,0,0,0.3);
  }
  .tap-btn:active { transform: scale(0.96); }
  .tap-btn:disabled { opacity: 0.5; }
  .tap-btn .sub { display: block; font-size: 10px; font-weight: 400; margin-top: 2px; opacity: 0.7; }
  .tap-coffee  { background: var(--coffee-bg); }
  .tap-coors   { background: var(--coors-bg); color: var(--coors-text); }
  .tap-coors .sub { color: var(--coors-text); opacity: 0.6; }
  .tap-bourbon { background: var(--bourbon-bg); }
  .water-group { display: flex; gap: 7px; }
  .water-group .tap-btn { flex: 1; background: var(--water-bg); padding: 17px 6px; font-size: 13px; }
  .tap-btn.flash::after {
    content: ''; position: absolute; inset: 0;
    background: rgba(255,255,255,0.28);
    animation: flashOut 0.35s ease-out forwards;
  }
  @keyframes flashOut { to { opacity: 0; } }

  /* ---- Collapsibles ---- */
  .section-toggle {
    width: 100%; background: var(--card); border: 1px solid var(--border);
    border-radius: 14px; padding: 12px 15px; color: var(--text);
    font-size: 14px; font-weight: 600; cursor: pointer; text-align: left;
    display: flex; justify-content: space-between; align-items: center;
    transition: border-radius 0.2s;
  }
  .section-toggle .arrow { font-size: 10px; color: var(--dim); transition: transform 0.2s; }
  .section-toggle.open { border-radius: 14px 14px 0 0; }
  .section-toggle.open .arrow { transform: rotate(180deg); }
  .section-content {
    display: none; background: var(--card); border: 1px solid var(--border);
    border-top: none; border-radius: 0 0 14px 14px; padding: 12px 13px; margin-bottom: 10px;
  }
  .section-content.open { display: block; }

  /* ---- Food Cards ---- */
  .food-card {
    background: var(--card2); border: 1px solid var(--border);
    border-radius: 12px; padding: 10px 12px; margin-bottom: 7px;
  }
  .food-card:last-child { margin-bottom: 0; }
  .food-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 4px; }
  .food-name { font-size: 14px; font-weight: 600; flex: 1; }
  .food-serving { font-size: 10px; color: var(--dim); background: var(--border); padding: 2px 7px; border-radius: 6px; }
  .food-macros { font-size: 11px; color: var(--dim); margin-bottom: 8px; }
  .food-actions { display: flex; align-items: center; gap: 7px; }
  .serving-btn {
    width: 32px; height: 32px; border-radius: 50%; border: 1px solid var(--border);
    background: var(--card); color: var(--text); font-size: 18px; font-weight: 600;
    cursor: pointer; display: flex; align-items: center; justify-content: center;
  }
  .serving-btn:active { background: var(--accent); color: #fff; }
  .serving-count { font-size: 18px; font-weight: 800; width: 24px; text-align: center; color: var(--accent); }
  .log-food-btn {
    background: var(--green); color: #000; border: none; border-radius: 9px;
    padding: 8px 14px; font-size: 13px; font-weight: 700; cursor: pointer; margin-left: auto;
    transition: transform 0.1s;
  }
  .log-food-btn:active { transform: scale(0.95); }

  /* ---- Add Food ---- */
  .add-food-toggle {
    width: 100%; background: transparent; border: 1px dashed var(--border);
    border-radius: 11px; padding: 12px; color: var(--accent);
    font-size: 14px; font-weight: 600; cursor: pointer; text-align: center; margin-top: 10px;
  }
  .add-food-form {
    background: var(--card2); border: 1px solid var(--border);
    border-radius: 11px; padding: 14px; display: none; margin-top: 10px;
  }
  .add-food-form.open { display: block; }
  .form-row { display: flex; gap: 7px; margin-bottom: 7px; flex-wrap: wrap; }
  .form-field { display: flex; flex-direction: column; flex: 1; min-width: 0; }
  .form-field.full { flex-basis: 100%; }
  .form-field label { font-size: 10px; color: var(--dim); margin-bottom: 3px; text-transform: uppercase; letter-spacing: 0.5px; }
  .form-field input {
    background: var(--bg); border: 1px solid var(--border); border-radius: 9px;
    padding: 9px 10px; color: var(--text); font-size: 14px; width: 100%;
  }
  .form-field input:focus { outline: none; border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-glow); }
  .batch-toggle { display: flex; margin-bottom: 9px; border-radius: 9px; overflow: hidden; border: 1px solid var(--border); }
  .batch-toggle button { flex: 1; padding: 8px; border: none; background: var(--bg); color: var(--dim); font-size: 12px; font-weight: 600; cursor: pointer; }
  .batch-toggle button.active { background: var(--accent); color: #fff; }
  .save-food-btn {
    width: 100%; background: linear-gradient(135deg, #2563eb, #3b82f6); color: #fff;
    border: none; border-radius: 9px; padding: 11px; font-size: 14px; font-weight: 700;
    cursor: pointer; margin-top: 4px;
  }
  .save-food-btn:active { transform: scale(0.97); }

  /* ---- Today's Log ---- */
  .log-item-card {
    background: var(--card2); border: 1px solid var(--border); border-left-width: 3px;
    border-radius: 10px; padding: 9px 11px; margin-bottom: 6px;
    display: flex; align-items: center; gap: 10px;
  }
  .log-item-card:last-child { margin-bottom: 0; }
  .log-item-icon { font-size: 17px; flex-shrink: 0; width: 24px; text-align: center; line-height: 1; }
  .log-item-body { flex: 1; min-width: 0; }
  .log-item-name { font-size: 13px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .log-item-meta { display: flex; gap: 5px; margin-top: 4px; }
  .log-pill { font-size: 10px; font-weight: 700; padding: 2px 7px; border-radius: 5px; }
  .log-pill.protein  { background: rgba(59,130,246,0.15); color: #60a5fa; }
  .log-pill.calories { background: rgba(245,158,11,0.15);  color: #fbbf24; }
  .log-item-time { font-size: 10px; color: var(--dim); flex-shrink: 0; align-self: flex-start; padding-top: 1px; }


  /* ---- Settings ---- */
  .settings-overlay {
    display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.7);
    z-index: 200; justify-content: center; align-items: center;
  }
  .settings-overlay.open { display: flex; }
  .settings-panel {
    background: var(--card); border: 1px solid var(--border); border-radius: 18px;
    padding: 20px 16px; width: 90%; max-width: 380px;
  }
  .settings-panel h3 { font-size: 16px; font-weight: 700; margin-bottom: 14px; text-align: center; }
  .settings-row {
    display: flex; justify-content: space-between; align-items: center;
    padding: 10px 0; border-bottom: 1px solid var(--border);
  }
  .settings-row:last-of-type { border-bottom: none; }
  .settings-row label { font-size: 13px; color: var(--dim); }
  .settings-row .hint { font-size: 10px; color: var(--dim); opacity: 0.7; }
  .settings-row input {
    background: var(--bg); border: 1px solid var(--border); border-radius: 8px;
    padding: 7px 8px; color: var(--text); font-size: 15px; font-weight: 700;
    width: 82px; text-align: center;
  }
  .settings-row input:focus { outline: none; border-color: var(--accent); }
  .settings-save-btn {
    width: 100%; background: var(--accent); color: #fff; border: none; border-radius: 10px;
    padding: 11px; font-size: 14px; font-weight: 700; cursor: pointer; margin-top: 14px;
  }
  .settings-close-btn {
    width: 100%; background: none; border: 1px solid var(--border); color: var(--dim);
    border-radius: 10px; padding: 9px; font-size: 13px; cursor: pointer; margin-top: 7px;
  }

  /* ---- Bottom Navigation ---- */
  .bottom-nav {
    position: fixed; bottom: 0; left: 50%; transform: translateX(-50%);
    width: 100%; max-width: 480px;
    background: rgba(11,17,32,0.97); border-top: 1px solid var(--border);
    backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px);
    display: grid; grid-template-columns: 1fr 1fr 1fr;
    padding: 6px 8px calc(6px + env(safe-area-inset-bottom, 0px)); z-index: 100;
  }
  .nav-item {
    display: flex; flex-direction: column; align-items: center; gap: 3px;
    background: none; border: none; cursor: pointer; padding: 7px 4px 5px;
    border-radius: 12px; transition: background 0.12s;
  }
  .nav-item:active { background: var(--border); }
  .nav-badge {
    width: 42px; height: 32px; border-radius: 9px;
    display: flex; align-items: center; justify-content: center;
    font-size: 11px; font-weight: 800; letter-spacing: 0.5px;
  }
  .nav-label { font-size: 9px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.8px; }
  .nav-workout   .nav-badge { background: var(--lime-glow);   color: var(--lime);   border: 1px solid rgba(163,230,53,0.25); }
  .nav-workout   .nav-label { color: var(--lime); }
  .nav-dashboard .nav-badge { background: var(--purple-glow); color: var(--purple); border: 1px solid rgba(167,139,250,0.25); }
  .nav-dashboard .nav-label { color: var(--purple); }
  .nav-recipe    .nav-badge { background: var(--accent-glow); color: var(--accent); border: 1px solid rgba(59,130,246,0.25); }
  .nav-recipe    .nav-label { color: var(--accent); }
</style>
</head>
<body>

<!-- Header -->
<div class="header">
  <button class="icon-btn" onclick="openSettings()" title="Settings">&#9881;</button>
  <div class="header-center">
    <h1>The Grind</h1>
    <div class="date" id="headerDate"></div>
  </div>
  <div class="header-right">
    <button class="icon-btn" onclick="hardRefresh()" title="Refresh">&#8635;</button>
  </div>
</div>

<!-- Settings Overlay -->
<div class="settings-overlay" id="settingsOverlay" onclick="if(event.target===this)closeSettings()">
  <div class="settings-panel">
    <h3>Daily Targets</h3>
    <div class="settings-row">
      <div><label>Protein</label><div class="hint">Hit or exceed</div></div>
      <div style="display:flex;align-items:center;gap:4px">
        <input type="number" id="setProt" inputmode="numeric">
        <span style="color:var(--dim);font-size:11px">g</span>
      </div>
    </div>
    <div class="settings-row">
      <div><label>Calories</label><div class="hint">Stay under</div></div>
      <input type="number" id="setCal" inputmode="numeric">
    </div>
    <div class="settings-row">
      <div><label>Water</label><div class="hint">Fill to target</div></div>
      <div style="display:flex;align-items:center;gap:4px">
        <input type="number" id="setWater" inputmode="numeric">
        <span style="color:var(--dim);font-size:11px">oz</span>
      </div>
    </div>
    <button class="settings-save-btn" onclick="saveSettings()">Save</button>
    <button class="settings-close-btn" onclick="closeSettings()">Cancel</button>
  </div>
</div>

<div class="status-banner" id="statusBanner"></div>

<!-- Yesterday Feedback -->
<div class="feedback-card" id="feedbackCard">
  <div class="feedback-title">Yesterday's Recap</div>
  <div id="feedbackContent"></div>
</div>

<!-- Day Navigation -->
<div class="day-nav">
  <button class="day-nav-btn" id="prevDay" onclick="changeDay(-1)">&#8249;</button>
  <div class="day-nav-center">
    <div class="day-nav-date" id="dayNavDate">Today</div>
    <div class="day-nav-sub" id="dayNavSub"></div>
  </div>
  <button class="day-nav-btn" id="nextDay" onclick="changeDay(1)" disabled>&#8250;</button>
</div>

<!-- Hero Stats Card -->
<div class="hero-card" id="totalsCard">
  <div class="hero-main">
    <!-- Protein Ring -->
    <div class="ring-wrap">
      <svg class="protein-ring" viewBox="0 0 100 100">
        <defs>
          <linearGradient id="ringGrad" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#2563eb"/>
            <stop offset="100%" stop-color="#60a5fa"/>
          </linearGradient>
          <linearGradient id="ringGradHit" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#16a34a"/>
            <stop offset="100%" stop-color="#4ade80"/>
          </linearGradient>
          <filter id="ringGlow" x="-25%" y="-25%" width="150%" height="150%">
            <feGaussianBlur in="SourceGraphic" stdDeviation="2" result="blur"/>
            <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
          </filter>
        </defs>
        <circle class="ring-track" cx="50" cy="50" r="42"/>
        <circle class="ring-fill" id="ringFill" cx="50" cy="50" r="42"
          stroke="url(#ringGrad)" filter="url(#ringGlow)"/>
        <text x="50" y="44" text-anchor="middle" fill="#e4e8f1"
          font-size="17" font-weight="800"
          font-family="-apple-system,BlinkMacSystemFont,sans-serif"
          id="ringValue">--</text>
        <text x="50" y="55" text-anchor="middle" fill="#6b7a99"
          font-size="8" font-family="-apple-system,sans-serif">PROTEIN</text>
        <text x="50" y="65" text-anchor="middle" fill="#6b7a99"
          font-size="8" font-family="-apple-system,sans-serif"
          id="ringTarget">/ 190g</text>
      </svg>
    </div>

    <!-- Calories + Stats -->
    <div class="cal-panel">
      <div class="cal-label">Calories</div>
      <div class="cal-row">
        <span class="cal-value" id="totalCalories">--</span>
        <span class="cal-of" id="calTarget">/ 2,300</span>
      </div>
      <div class="cal-bar-wrap">
        <div class="cal-bar" id="calorieBar" style="width:0%"></div>
      </div>
      <div class="mini-row">
        <div class="mini-stat">
          <div class="ms-label">Water</div>
          <div class="ms-value water" id="totalWater">0</div>
        </div>
        <div class="mini-stat">
          <div class="ms-label">Coffee</div>
          <div class="ms-value coffee" id="totalCoffee">0</div>
        </div>
        <div class="mini-stat">
          <div class="ms-label">Workout</div>
          <div class="ms-value rest" id="workoutStatus">--</div>
        </div>
      </div>
    </div>
  </div>

  <!-- Drink row -->
  <div class="drink-row">
    <div class="drink-chip coors">
      <span class="dc-label">Coors</span>
      <span class="dc-val" id="totalCoors">0</span>
    </div>
    <div class="drink-chip bourbon">
      <span class="dc-label">Bourbon</span>
      <span class="dc-val" id="totalBourbon">0</span>
    </div>
  </div>
</div>

<!-- Bodyweight -->
<div class="weight-strip unlogged" id="weightStrip">
  <span class="weight-strip-label" id="weightStripLabel">Log weight</span>
  <input type="number" id="weightInput" inputmode="decimal" step="0.1" placeholder="0.0">
  <span class="unit">lbs</span>
  <button class="weight-save-btn" id="weightSaveBtn" onclick="saveWeight()">Log</button>
  <span class="weight-logged-badge" id="weightToday"></span>
</div>

<!-- Quick Log -->
<h2>Quick Log</h2>
<div class="quick-taps">
  <button class="tap-btn tap-coffee" onclick="tapLiquid('coffee', this)">Coffee<span class="sub">+1 cup &middot; 75 cal</span></button>
  <div class="water-group">
    <button class="tap-btn" onclick="tapLiquid('water', this, 12)">Water<span class="sub">12 oz</span></button>
    <button class="tap-btn" onclick="tapLiquid('water', this, 24)">Water<span class="sub">24 oz</span></button>
  </div>
  <button class="tap-btn tap-coors" onclick="tapLiquid('coors', this)">Coors<span class="sub">+1 &middot; 102 cal</span></button>
  <button class="tap-btn tap-bourbon" onclick="tapLiquid('bourbon', this)">Bourbon<span class="sub">+1 &middot; 97 cal</span></button>
</div>

<!-- Food Library -->
<h2>Food</h2>
<button class="section-toggle" id="foodToggle" onclick="toggleSection('food')">
  <span>My Food Library</span>
  <span class="arrow">&#9660;</span>
</button>
<div class="section-content" id="foodSection">
  <div id="foodList"><div style="color:var(--dim);text-align:center;padding:12px 0;font-size:13px;">Loading...</div></div>
  <button class="add-food-toggle" onclick="toggleAddFood()">+ Add New Food</button>
  <div class="add-food-form" id="addFoodForm">
    <div class="form-row"><div class="form-field full"><label>Name</label><input type="text" id="newFoodName" placeholder="e.g. Chicken &amp; Rice Bowl"></div></div>
    <div class="form-row"><div class="form-field full"><label>Serving Label</label><input type="text" id="newServingLabel" placeholder="e.g. 1 container" value="1 container"></div></div>
    <div class="form-row"><div class="form-field"><label>Containers</label><input type="number" id="newContainers" value="1" min="1"></div></div>
    <div class="batch-toggle">
      <button class="active" onclick="setBatchMode(false, this)">Per Serving</button>
      <button onclick="setBatchMode(true, this)">Batch Total</button>
    </div>
    <div class="form-row">
      <div class="form-field"><label>Protein (g)</label><input type="number" id="newProtein" inputmode="decimal"></div>
      <div class="form-field"><label>Calories</label><input type="number" id="newCalories" inputmode="decimal"></div>
    </div>
    <div class="form-row">
      <div class="form-field"><label>Carbs (g)</label><input type="number" id="newCarbs" inputmode="decimal"></div>
      <div class="form-field"><label>Fat (g)</label><input type="number" id="newFat" inputmode="decimal"></div>
    </div>
    <div class="form-row">
      <div class="form-field"><label>Sugar (g)</label><input type="number" id="newSugar" inputmode="decimal"></div>
      <div class="form-field"><label>Sodium (mg)</label><input type="number" id="newSodium" inputmode="decimal"></div>
    </div>
    <button class="save-food-btn" onclick="saveNewFood()">Save to Library</button>
  </div>
</div>

<!-- Today's Log -->
<h2>Activity</h2>
<button class="section-toggle" id="logToggle" onclick="toggleSection('log')">
  <span>Today's Log</span>
  <span class="arrow">&#9660;</span>
</button>
<div class="section-content" id="logSection">
  <div id="todayLog"><div style="color:var(--dim);text-align:center;padding:12px 0;font-size:13px;">Nothing logged yet today.</div></div>
</div>

<!-- Fixed Bottom Navigation -->
<nav class="bottom-nav">
  <button class="nav-item nav-workout" onclick="openWorkout()">
    <div class="nav-badge">LIFT</div>
    <span class="nav-label">Workout</span>
  </button>
  <button class="nav-item nav-dashboard" onclick="openDashboard()">
    <div class="nav-badge">STAT</div>
    <span class="nav-label">Dashboard</span>
  </button>
  <button class="nav-item nav-recipe" onclick="openRecipeBuilder()">
    <div class="nav-badge">COOK</div>
    <span class="nav-label">Recipe</span>
  </button>
</nav>

<script>
const API = 'https://script.google.com/macros/s/AKfycbzEcwU-CfMajZdxUVN2a823tPG85IOjhTK7_akWmkJ7oGvOM1Jt6RvbI2-RMwykECu_XQ/exec';
const RING_CIRC = 263.9; // 2*pi*42

let foodsCache = [];
let isBatchMode = false;

const DEFAULT_TARGETS = { protein: 190, calories: 2300, water: 128 };
function getTargets() {
  const raw = localStorage.getItem('grind_targets');
  return raw ? JSON.parse(raw) : { ...DEFAULT_TARGETS };
}
function saveTargetsToStorage(t) { localStorage.setItem('grind_targets', JSON.stringify(t)); }
let targets = getTargets();

// ---- Settings ----
function openSettings() {
  document.getElementById('setProt').value  = targets.protein;
  document.getElementById('setCal').value   = targets.calories;
  document.getElementById('setWater').value = targets.water;
  document.getElementById('settingsOverlay').classList.add('open');
}
function closeSettings() { document.getElementById('settingsOverlay').classList.remove('open'); }
function saveSettings() {
  targets.protein  = parseInt(document.getElementById('setProt').value)  || DEFAULT_TARGETS.protein;
  targets.calories = parseInt(document.getElementById('setCal').value)   || DEFAULT_TARGETS.calories;
  targets.water    = parseInt(document.getElementById('setWater').value) || DEFAULT_TARGETS.water;
  saveTargetsToStorage(targets);
  closeSettings();
  location.reload(true);
}

document.getElementById('headerDate').textContent = new Date().toLocaleDateString('en-US', {
  weekday: 'long', month: 'long', day: 'numeric'
});

// ---- API ----
async function apiGet(action) {
  const res = await fetch(API + '?action=' + action);
  return res.json();
}
async function apiPost(body) {
  const res = await fetch(API, {
    method: 'POST',
    headers: { 'Content-Type': 'text/plain;charset=utf-8' },
    body: JSON.stringify(body)
  });
  return res.json();
}

function showStatus(msg, type) {
  const el = document.getElementById('statusBanner');
  el.textContent = msg;
  el.className = 'status-banner ' + type;
  if (type === 'success') setTimeout(() => { el.className = 'status-banner'; }, 2000);
}

// ---- Collapsibles ----
function toggleSection(name) {
  document.getElementById(name + 'Toggle').classList.toggle('open');
  document.getElementById(name + 'Section').classList.toggle('open');
}

// ---- Load All ----
async function loadAll() {
  try {
    showStatus('Loading...', 'loading');
    const [foods, summary, yesterday] = await Promise.all([
      apiGet('getFoods'),
      apiGet('getDaySummary'),
      apiGet('getYesterday')
    ]);
    foodsCache = foods;
    renderTotals(summary.totals);
    renderFoods(foods);
    renderLog(summary.log);
    renderFeedback(yesterday);
    loadWeightData();
    document.getElementById('statusBanner').className = 'status-banner';
  } catch (err) {
    showStatus('Failed to connect. Check your internet.', 'error');
    console.error(err);
  }
}

// ---- Render Hero Card ----
function renderTotals(t) {
  const pPct = Math.min(1, (t.protein  || 0) / targets.protein);
  const cPct = Math.min(1, (t.calories || 0) / targets.calories);
  const hit  = (t.protein  || 0) >= targets.protein;
  const over = (t.calories || 0) >  targets.calories;

  // Protein ring
  const ring = document.getElementById('ringFill');
  ring.style.strokeDashoffset = RING_CIRC * (1 - pPct);
  ring.setAttribute('stroke', hit ? 'url(#ringGradHit)' : 'url(#ringGrad)');
  document.getElementById('ringValue').textContent  = (t.protein  || 0) + 'g';
  document.getElementById('ringTarget').textContent = '/ ' + targets.protein + 'g';

  // Calories
  const calEl = document.getElementById('totalCalories');
  calEl.textContent = (t.calories || 0).toLocaleString();
  calEl.className = 'cal-value' + (over ? ' over' : '');
  document.getElementById('calorieBar').style.width = (cPct * 100) + '%';
  document.getElementById('calorieBar').className   = 'cal-bar' + (over ? ' over' : '');
  document.getElementById('calTarget').textContent  = '/ ' + targets.calories.toLocaleString();

  // Mini stats
  document.getElementById('totalWater').textContent  = (t.waterOz     || 0) + ' oz';
  document.getElementById('totalCoffee').textContent = t.coffeeCount  || 0;
  const ws = document.getElementById('workoutStatus');
  if (t.workoutDone === 'Yes') {
    ws.textContent = 'Done'; ws.className = 'ms-value done';
  } else {
    ws.textContent = 'Rest'; ws.className = 'ms-value rest';
  }

  // Drinks
  document.getElementById('totalCoors').textContent   = t.coorsCount   || 0;
  document.getElementById('totalBourbon').textContent = t.bourbonCount || 0;
}

// ---- Yesterday Feedback ----
function renderFeedback(y) {
  const card    = document.getElementById('feedbackCard');
  const content = document.getElementById('feedbackContent');
  if (!y.hasData) return;

  const tips = [];
  const gap  = targets.protein - y.protein;
  if (y.protein >= targets.protein) {
    tips.push({ c: 'var(--green)', t: 'Protein goal hit — ' + y.protein + 'g.' });
  } else if (gap <= 30) {
    tips.push({ c: 'var(--orange)', t: gap + 'g short on protein (' + y.protein + 'g). A shake would close that.' });
  } else {
    tips.push({ c: 'var(--red)', t: 'Protein: ' + y.protein + 'g — ' + gap + 'g under. Add more meat or cottage cheese today.' });
  }

  const calDiff = y.calories - targets.calories;
  if (calDiff > 300) {
    tips.push({ c: 'var(--orange)', t: calDiff + ' cal over (' + y.calories.toLocaleString() + '). Trim portions today.' });
  } else if (calDiff < -500) {
    tips.push({ c: 'var(--orange)', t: 'Only ' + y.calories.toLocaleString() + ' cal — too low. Aim for ' + targets.calories.toLocaleString() + '.' });
  } else {
    tips.push({ c: 'var(--green)', t: 'Calories solid at ' + y.calories.toLocaleString() + '.' });
  }

  if (y.waterOz >= targets.water) {
    tips.push({ c: 'var(--green)', t: 'Water goal crushed: ' + y.waterOz + ' oz.' });
  } else if (y.waterOz > 0) {
    tips.push({ c: 'var(--dim)', t: 'Water: ' + y.waterOz + ' oz. Target is ' + targets.water + ' oz.' });
  }

  const drinks = (y.coorsCount || 0) + (y.bourbonCount || 0);
  if (drinks > 0) {
    tips.push({ c: 'var(--dim)', t: drinks + ' drink' + (drinks > 1 ? 's' : '') + ' logged yesterday.' });
  }

  content.innerHTML = tips.map(tip =>
    '<div class="feedback-item"><span class="fi-icon" style="color:' + tip.c + '">&#8226;</span>' + tip.t + '</div>'
  ).join('');
  card.classList.add('show');
}

// ---- Quick Tap Liquids ----
async function tapLiquid(type, btn, amount) {
  btn.classList.remove('flash');
  void btn.offsetWidth;
  btn.classList.add('flash');
  btn.disabled = true;
  try {
    await apiPost({ action: 'logLiquid', type, amount: amount || 1 });
    await refreshTotalsAndLog();
  } catch (err) {
    showStatus('Failed to log ' + type, 'error');
  } finally {
    btn.disabled = false;
  }
}

// ---- Log Food ----
async function logFood(foodId) {
  const food   = foodsCache.find(f => f.id === foodId);
  if (!food) return;
  const sEl    = document.getElementById('srv-' + foodId);
  const servings = parseInt(sEl.textContent);
  const logBtn = sEl.closest('.food-card').querySelector('.log-food-btn');
  logBtn.disabled = true; logBtn.textContent = '...';
  try {
    await apiPost({ action: 'logFood', foodId, servings });
    sEl.textContent = '1';
    await refreshTotalsAndLog();
    showStatus('Logged ' + food.name + (servings > 1 ? ' x' + servings : ''), 'success');
  } catch (err) {
    showStatus('Failed to log food', 'error');
  } finally {
    logBtn.disabled = false; logBtn.textContent = 'Log';
  }
}

function adjustServing(foodId, delta) {
  const el  = document.getElementById('srv-' + foodId);
  el.textContent = Math.min(10, Math.max(1, parseInt(el.textContent) + delta));
}

// ---- Add New Food ----
function toggleAddFood() { document.getElementById('addFoodForm').classList.toggle('open'); }
function setBatchMode(batch, btn) {
  isBatchMode = batch;
  btn.parentElement.querySelectorAll('button').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
}
async function saveNewFood() {
  const name = document.getElementById('newFoodName').value.trim();
  if (!name) { alert('Enter a food name.'); return; }
  const body = {
    action: 'addFood', name,
    servingLabel: document.getElementById('newServingLabel').value.trim() || '1 serving',
    containers:   parseInt(document.getElementById('newContainers').value) || 1,
    isBatch: isBatchMode,
    protein:  parseFloat(document.getElementById('newProtein').value)  || 0,
    calories: parseFloat(document.getElementById('newCalories').value) || 0,
    carbs:    parseFloat(document.getElementById('newCarbs').value)    || 0,
    fat:      parseFloat(document.getElementById('newFat').value)      || 0,
    sugar:    parseFloat(document.getElementById('newSugar').value)    || 0,
    sodium:   parseFloat(document.getElementById('newSodium').value)   || 0
  };
  const saveBtn = document.querySelector('.save-food-btn');
  saveBtn.disabled = true; saveBtn.textContent = 'Saving...';
  try {
    const result = await apiPost(body);
    if (result.success) {
      foodsCache.push(result.food);
      renderFoods(foodsCache);
      ['newFoodName','newProtein','newCalories','newCarbs','newFat','newSugar','newSodium'].forEach(id => {
        document.getElementById(id).value = '';
      });
      document.getElementById('newContainers').value = '1';
      document.getElementById('addFoodForm').classList.remove('open');
      showStatus('Added ' + name + ' to library', 'success');
    }
  } catch (err) {
    showStatus('Failed to save food', 'error');
  } finally {
    saveBtn.disabled = false; saveBtn.textContent = 'Save to Library';
  }
}

// ---- Refresh After Logging ----
async function refreshTotalsAndLog() {
  try {
    const dateParam = viewOffset !== 0 ? '&date=' + getViewDateStr() : '';
    const summary = await apiGet('getDaySummary' + dateParam);
    renderTotals(summary.totals);
    renderLog(summary.log);
  } catch (err) { console.error('Refresh failed:', err); }
}

// ---- Render Foods ----
function renderFoods(foods) {
  const container = document.getElementById('foodList');
  if (!foods.length) {
    container.innerHTML = '<div style="color:var(--dim);text-align:center;padding:12px 0;font-size:13px;">No foods yet.</div>';
    return;
  }
  const filtered = foods.filter(f => f.id !== 'f006');
  container.innerHTML = filtered.map(f => `
    <div class="food-card">
      <div class="food-top">
        <span class="food-name">${f.name}</span>
        <span class="food-serving">${f.servingLabel}</span>
      </div>
      <div class="food-macros">${f.protein}p / ${f.calories}cal / ${f.carbs}c / ${f.fat}f</div>
      <div class="food-actions">
        <button class="serving-btn" onclick="adjustServing('${f.id}',-1)">&#8722;</button>
        <span class="serving-count" id="srv-${f.id}">1</span>
        <button class="serving-btn" onclick="adjustServing('${f.id}',1)">&#43;</button>
        <button class="log-food-btn" onclick="logFood('${f.id}')">Log</button>
      </div>
    </div>
  `).join('');
}

// ---- Render Log ----
function renderLog(entries) {
  const container = document.getElementById('todayLog');
  if (!entries || !entries.length) {
    container.innerHTML = '<div style="color:var(--dim);text-align:center;padding:16px 0;font-size:13px;">Nothing logged yet today.</div>';
    return;
  }
  container.innerHTML = entries.slice().reverse().map(e => {
    const time = new Date(e.timestamp).toLocaleTimeString('en-US', { hour: 'numeric', minute: '2-digit' });
    const n = e.item.toLowerCase();
    let icon = '🍽️', borderColor = 'var(--border)';
    if (n.includes('coffee'))  { icon = '☕'; borderColor = '#a8a29e'; }
    else if (n.includes('water'))   { icon = '💧'; borderColor = 'var(--accent)'; }
    else if (n.includes('coors') || n.includes('beer'))    { icon = '🍺'; borderColor = '#fbbf24'; }
    else if (n.includes('bourbon') || n.includes('whiskey')) { icon = '🥃'; borderColor = '#f87171'; }
    else if (e.protein >= 35)  { icon = '🥩'; borderColor = 'var(--green)'; }
    else if (e.protein > 0)    { icon = '🍗'; borderColor = 'var(--green)'; }
    const proteinPill  = e.protein  > 0 ? `<span class="log-pill protein">${e.protein}p</span>` : '';
    const calsPill     = e.calories > 0 ? `<span class="log-pill calories">${e.calories} cal</span>` : '';
    return `
      <div class="log-item-card" style="border-left-color:${borderColor}">
        <div class="log-item-icon">${icon}</div>
        <div class="log-item-body">
          <div class="log-item-name">${e.item}</div>
          <div class="log-item-meta">${proteinPill}${calsPill}</div>
        </div>
        <div class="log-item-time">${time}</div>
      </div>`;
  }).join('');
}

// ---- Bodyweight ----
async function saveWeight() {
  const input  = document.getElementById('weightInput');
  const weight = parseFloat(input.value);
  if (!weight || weight < 50 || weight > 500) { alert('Enter a valid weight.'); return; }
  const btn = document.getElementById('weightSaveBtn');
  btn.disabled = true; btn.textContent = '...';
  try {
    const result = await apiPost({ action: 'logBodyweight', weight });
    if (result.success) {
      document.getElementById('weightToday').textContent = weight + ' lbs saved';
      setTimeout(() => { document.getElementById('weightToday').textContent = ''; }, 2500);
      await loadWeightData();
    }
  } catch (err) { showStatus('Failed to log weight', 'error'); }
  finally { btn.disabled = false; btn.textContent = 'Log'; }
}

async function loadWeightData() {
  try {
    const history = await apiGet('getWeightHistory');
    const todayStr   = new Date().toLocaleDateString('en-CA');
    const todayEntry = history.find(h => h.date === todayStr);
    const strip  = document.getElementById('weightStrip');
    const label  = document.getElementById('weightStripLabel');
    if (todayEntry) {
      strip.classList.remove('unlogged');
      label.textContent = 'Update weight';
      document.getElementById('weightInput').value = todayEntry.weight;
    } else {
      strip.classList.add('unlogged');
      label.textContent = "Log today's weight";
      if (history.length > 0) document.getElementById('weightInput').value = history[history.length - 1].weight;
    }
    document.getElementById('weightToday').textContent = '';
  } catch (err) { console.error('Weight load failed:', err); }
}

// ---- Navigation ----
function openWorkout()       { window.location.href = 'workout.html'; }
function openDashboard()     { window.location.href = 'dashboard.html'; }
function openRecipeBuilder() { window.location.href = 'recipe.html'; }

// ---- Hard Refresh ----
function hardRefresh() {
  if ('caches' in window) caches.keys().then(names => names.forEach(n => caches.delete(n)));
  window.location.href = window.location.pathname + '?t=' + Date.now();
}

// ---- Day Navigation ----
let viewOffset = 0;
function getViewDateStr() {
  const d = new Date(); d.setDate(d.getDate() + viewOffset);
  return d.toLocaleDateString('en-CA');
}
function updateDayNav() {
  const d = new Date(); d.setDate(d.getDate() + viewOffset);
  if (viewOffset === 0) {
    document.getElementById('dayNavDate').textContent = 'Today';
  } else if (viewOffset === -1) {
    document.getElementById('dayNavDate').textContent = 'Yesterday';
  } else {
    document.getElementById('dayNavDate').textContent = d.toLocaleDateString('en-US', { weekday: 'short', month: 'short', day: 'numeric' });
  }
  document.getElementById('dayNavSub').textContent = getViewDateStr();
  document.getElementById('nextDay').disabled = (viewOffset >= 0);
}
async function changeDay(delta) {
  viewOffset += delta;
  updateDayNav();
  const card = document.getElementById('totalsCard');
  card.classList.add('loading-day');
  try {
    const summary = await apiGet('getDaySummary&date=' + getViewDateStr());
    renderTotals(summary.totals);
    renderLog(summary.log);
  } catch (err) { console.error('Day load failed:', err); }
  finally { card.classList.remove('loading-day'); }
}

// Swipe on hero card
(function() {
  let startX = 0, startY = 0;
  const el = document.getElementById('totalsCard');
  el.addEventListener('touchstart', e => {
    startX = e.touches[0].clientX;
    startY = e.touches[0].clientY;
  }, { passive: true });
  el.addEventListener('touchend', e => {
    const dx = e.changedTouches[0].clientX - startX;
    const dy = e.changedTouches[0].clientY - startY;
    if (Math.abs(dx) > 55 && Math.abs(dx) > Math.abs(dy) * 1.5) {
      if (dx > 0) changeDay(-1);
      else if (viewOffset < 0) changeDay(1);
    }
  }, { passive: true });
})();

// ---- Init ----
updateDayNav();
loadAll();
</script>
</body>
