<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>The Grind – Food</title>
  <script src="https://cdn.jsdelivr.net/npm/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
  <style>
    :root {
      --bg: #0d0e10;
      --card: #191b21;
      --card2: #21232a;
      --border: rgba(255,255,255,0.08);
      --text: #f0f0f0;
      --dim: #7a808e;
      --accent: #3b82f6;
      --accent-glow: rgba(59,130,246,0.18);
      --green: #22c55e;
      --green-glow: rgba(34,197,94,0.18);
      --orange: #f59e0b;
      --red: #ef4444;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      background: var(--bg); color: var(--text);
      max-width: 480px; margin: 0 auto;
      padding-bottom: 24px; min-height: 100vh;
    }

    /* ---- Header ---- */
    .header {
      background: rgba(13,14,16,0.97);
      border-bottom: 1px solid var(--border);
      padding: 12px 16px;
      display: flex; justify-content: space-between; align-items: center;
      position: sticky; top: 0; z-index: 50;
      backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
    }
    .header-left { display: flex; align-items: center; gap: 10px; }
    .back-btn {
      background: none; border: none; color: var(--dim);
      font-size: 22px; cursor: pointer; padding: 2px 6px 2px 0; line-height: 1;
    }
    .header-title { font-size: 13px; font-weight: 900; letter-spacing: 3px; color: #c8ff00; }
    .header-sub { font-size: 11px; color: var(--accent); font-weight: 700; letter-spacing: 1px; margin-top: 1px; }

    /* ---- Macro Bar ---- */
    .macro-bar {
      background: var(--card); border-bottom: 1px solid var(--border);
      padding: 10px 16px; display: flex; gap: 16px; align-items: center;
    }
    .mb-item { text-align: center; flex: 1; }
    .mb-value { font-size: 18px; font-weight: 800; }
    .mb-value.prot { color: var(--accent); }
    .mb-value.cal  { color: var(--orange); }
    .mb-label { font-size: 9px; color: var(--dim); text-transform: uppercase; letter-spacing: 0.5px; margin-top: 1px; }
    .mb-bar-wrap { flex: 2; }
    .mb-bar-track { height: 5px; background: var(--border); border-radius: 3px; overflow: hidden; margin-bottom: 4px; }
    .mb-bar-fill { height: 100%; border-radius: 3px; transition: width 0.5s ease; }
    .mb-bar-fill.prot { background: var(--accent); }
    .mb-bar-fill.cal  { background: var(--orange); }
    .mb-bar-fill.over { background: var(--red); }
    .mb-bar-label { font-size: 9px; color: var(--dim); display: flex; justify-content: space-between; }

    /* ---- Content ---- */
    .content { padding: 14px 16px; }

    /* ---- Search ---- */
    .search-row { display: flex; gap: 8px; margin-bottom: 14px; }
    .search-row .search-wrap { flex: 1; margin-bottom: 0; }
    .search-wrap { position: relative; }
    .search-wrap input {
      width: 100%; background: var(--card); border: 1px solid var(--border);
      border-radius: 12px; padding: 11px 14px 11px 38px;
      color: var(--text); font-size: 14px;
    }
    .search-wrap input:focus { outline: none; border-color: var(--accent); }
    .search-icon {
      position: absolute; left: 13px; top: 50%; transform: translateY(-50%);
      color: var(--dim); font-size: 15px; pointer-events: none;
    }
    .scan-btn {
      background: var(--card); border: 1px solid var(--border); border-radius: 12px;
      color: var(--dim); font-size: 20px; cursor: pointer;
      width: 46px; flex-shrink: 0; display: flex; align-items: center; justify-content: center;
    }
    .scan-btn:active { border-color: var(--accent); color: var(--accent); }

    /* ---- Scanner Overlay ---- */
    .scanner-overlay {
      display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.95);
      z-index: 300; flex-direction: column;
    }
    .scanner-overlay.open { display: flex; }
    .scanner-header {
      display: flex; justify-content: space-between; align-items: center;
      padding: 16px 18px; flex-shrink: 0;
    }
    .scanner-title { font-size: 16px; font-weight: 700; color: var(--text); }
    .scanner-close {
      background: var(--card); border: 1px solid var(--border); border-radius: 50%;
      color: var(--dim); font-size: 16px; width: 36px; height: 36px; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
    }
    #qrReader { flex: 1; overflow: hidden; }
    #qrReader video { width: 100% !important; height: 100% !important; object-fit: cover; }
    #qrReader img { display: none; }
    .scan-status {
      padding: 14px 18px; text-align: center; font-size: 13px; color: var(--dim);
      background: var(--card); border-top: 1px solid var(--border); flex-shrink: 0;
    }

    /* ---- Food Cards ---- */
    .food-card {
      background: var(--card); border: 1px solid var(--border);
      border-radius: 14px; padding: 12px 14px; margin-bottom: 9px;
    }
    .food-top { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 4px; }
    .food-name { font-size: 14px; font-weight: 700; flex: 1; line-height: 1.3; }
    .food-serving { font-size: 10px; color: var(--dim); background: var(--border); padding: 2px 8px; border-radius: 6px; flex-shrink: 0; margin-left: 8px; }
    .food-macros { font-size: 11px; color: var(--dim); margin-bottom: 10px; }
    .food-macros .prot { color: var(--accent); font-weight: 700; }
    .food-actions { display: flex; align-items: center; gap: 8px; }
    .serving-btn {
      width: 34px; height: 34px; border-radius: 50%; border: 1px solid var(--border);
      background: var(--card2); color: var(--text); font-size: 18px; font-weight: 600;
      cursor: pointer; display: flex; align-items: center; justify-content: center;
    }
    .serving-btn:active { background: var(--accent); color: #fff; border-color: var(--accent); }
    .serving-count { font-size: 18px; font-weight: 800; width: 26px; text-align: center; color: var(--accent); }
    .log-food-btn {
      background: var(--green); color: #000; border: none; border-radius: 10px;
      padding: 9px 16px; font-size: 13px; font-weight: 700; cursor: pointer; margin-left: auto;
    }
    .log-food-btn:active { opacity: 0.8; transform: scale(0.96); }
    .log-food-btn.logging { background: var(--border); color: var(--dim); }

    /* ---- Add Food ---- */
    .section-title {
      font-size: 10px; font-weight: 700; color: var(--dim);
      text-transform: uppercase; letter-spacing: 1.5px; margin: 20px 0 10px;
    }
    .add-food-toggle {
      width: 100%; background: transparent; border: 1px dashed var(--border);
      border-radius: 11px; padding: 12px; color: var(--accent);
      font-size: 14px; font-weight: 600; cursor: pointer; text-align: center;
    }
    .add-food-toggle:active { background: var(--accent-glow); }
    .add-food-form {
      background: var(--card); border: 1px solid var(--border);
      border-radius: 14px; padding: 16px; display: none; margin-top: 10px;
    }
    .add-food-form.open { display: block; }
    .form-row { display: flex; gap: 8px; margin-bottom: 8px; flex-wrap: wrap; }
    .form-field { display: flex; flex-direction: column; flex: 1; min-width: 0; }
    .form-field.full { flex-basis: 100%; }
    .form-field label { font-size: 10px; color: var(--dim); margin-bottom: 3px; text-transform: uppercase; letter-spacing: 0.5px; }
    .form-field input {
      background: var(--bg); border: 1px solid var(--border); border-radius: 9px;
      padding: 9px 10px; color: var(--text); font-size: 14px; width: 100%;
    }
    .form-field input:focus { outline: none; border-color: var(--accent); }
    .batch-toggle { display: flex; margin-bottom: 10px; border-radius: 9px; overflow: hidden; border: 1px solid var(--border); }
    .batch-toggle button { flex: 1; padding: 8px; border: none; background: var(--bg); color: var(--dim); font-size: 12px; font-weight: 600; cursor: pointer; }
    .batch-toggle button.active { background: var(--accent); color: #fff; }
    .save-food-btn {
      width: 100%; background: var(--accent); color: #fff;
      border: none; border-radius: 10px; padding: 12px; font-size: 14px; font-weight: 700;
      cursor: pointer; margin-top: 6px;
    }
    .save-food-btn:active { opacity: 0.85; }

    /* ---- Status ---- */
    .toast {
      position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
      background: var(--green); color: #000; padding: 10px 20px;
      border-radius: 20px; font-size: 13px; font-weight: 700;
      opacity: 0; pointer-events: none; transition: opacity 0.2s; z-index: 99;
      white-space: nowrap;
    }
    .toast.show { opacity: 1; }

    .empty { text-align: center; padding: 32px 0; color: var(--dim); font-size: 13px; }
    .loading { text-align: center; padding: 32px 0; color: var(--dim); }
    .spinner {
      width: 28px; height: 28px;
      border: 2px solid rgba(255,255,255,0.08); border-top-color: var(--accent);
      border-radius: 50%; animation: spin 0.8s linear infinite;
      margin: 0 auto 12px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>

<div class="header">
  <div class="header-left">
    <button class="back-btn" onclick="goHome()">&#8592;</button>
    <div>
      <div class="header-title">THE GRIND</div>
      <div class="header-sub">FOOD LOG</div>
    </div>
  </div>
</div>

<!-- Today's macro bar -->
<div class="macro-bar" id="macroBar">
  <div class="mb-item">
    <div class="mb-value prot" id="mbProt">--</div>
    <div class="mb-label">Protein</div>
  </div>
  <div class="mb-bar-wrap">
    <div class="mb-bar-track"><div class="mb-bar-fill prot" id="protBar" style="width:0%"></div></div>
    <div class="mb-bar-label"><span id="mbProtLabel">0 / 190g</span></div>
    <div class="mb-bar-track" style="margin-top:5px"><div class="mb-bar-fill cal" id="calBar" style="width:0%"></div></div>
    <div class="mb-bar-label"><span id="mbCalLabel">0 / 2,300 cal</span></div>
  </div>
  <div class="mb-item">
    <div class="mb-value cal" id="mbCal">--</div>
    <div class="mb-label">Calories</div>
  </div>
</div>

<div class="content">
  <div class="search-row">
    <div class="search-wrap">
      <span class="search-icon">&#128269;</span>
      <input type="text" id="searchInput" placeholder="Search foods…" oninput="filterFoods(this.value)">
    </div>
    <button class="scan-btn" onclick="openScanner()" title="Scan barcode">&#128247;</button>
  </div>

  <div id="foodList">
    <div class="loading"><div class="spinner"></div>Loading foods…</div>
  </div>

  <div class="section-title">Add New Food</div>
  <button class="add-food-toggle" onclick="toggleAddFood()">+ Add New Food</button>
  <div class="add-food-form" id="addFoodForm">
    <div class="form-row"><div class="form-field full"><label>Name</label><input type="text" id="newFoodName" placeholder="e.g. Chicken & Rice Bowl"></div></div>
    <div class="form-row"><div class="form-field full"><label>Serving Label</label><input type="text" id="newServingLabel" placeholder="e.g. 1 container" value="1 container"></div></div>
    <div class="form-row"><div class="form-field"><label>Containers</label><input type="number" id="newContainers" value="1" min="1"></div></div>
    <div class="batch-toggle">
      <button class="active" onclick="setBatchMode(false, this)">Per Serving</button>
      <button onclick="setBatchMode(true, this)">Batch Total</button>
    </div>
    <div class="form-row">
      <div class="form-field"><label>Protein (g)</label><input type="number" id="newProtein" inputmode="decimal"></div>
      <div class="form-field"><label>Calories</label><input type="number" id="newCalories" inputmode="decimal"></div>
    </div>
    <div class="form-row">
      <div class="form-field"><label>Carbs (g)</label><input type="number" id="newCarbs" inputmode="decimal"></div>
      <div class="form-field"><label>Fat (g)</label><input type="number" id="newFat" inputmode="decimal"></div>
    </div>
    <div class="form-row">
      <div class="form-field"><label>Sugar (g)</label><input type="number" id="newSugar" inputmode="decimal"></div>
      <div class="form-field"><label>Sodium (mg)</label><input type="number" id="newSodium" inputmode="decimal"></div>
    </div>
    <button class="save-food-btn" onclick="saveNewFood()">Save to Library</button>
  </div>
</div>

<!-- Barcode Scanner Overlay -->
<div class="scanner-overlay" id="scannerOverlay">
  <div class="scanner-header">
    <span class="scanner-title">Scan Barcode</span>
    <button class="scanner-close" onclick="closeScanner()">&#10005;</button>
  </div>
  <div id="qrReader"></div>
  <div class="scan-status" id="scanStatus">Point camera at a barcode</div>
</div>

<div class="toast" id="toast"></div>

<script>
const API = 'https://script.google.com/macros/s/AKfycbzEcwU-CfMajZdxUVN2a823tPG85IOjhTK7_akWmkJ7oGvOM1Jt6RvbI2-RMwykECu_XQ/exec';

const DEFAULT_TARGETS = { protein: 190, calories: 2300, water: 128 };
function getTargets() {
  const raw = localStorage.getItem('grind_targets');
  return raw ? JSON.parse(raw) : { ...DEFAULT_TARGETS };
}
const targets = getTargets();

let foodsCache = [];
let isBatchMode = false;

async function apiGet(action) {
  const res = await fetch(API + '?action=' + action);
  return res.json();
}
async function apiPost(body) {
  const res = await fetch(API, {
    method: 'POST',
    headers: { 'Content-Type': 'text/plain;charset=utf-8' },
    body: JSON.stringify(body)
  });
  return res.json();
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2200);
}

async function loadAll() {
  try {
    const [foods, summary] = await Promise.all([
      apiGet('getFoods'),
      apiGet('getDaySummary')
    ]);
    foodsCache = foods;
    renderMacroBar(summary.totals);
    renderFoods(foods);
  } catch (err) {
    document.getElementById('foodList').innerHTML = '<div class="empty">Could not load. Check connection.</div>';
  }
}

function renderMacroBar(t) {
  const pPct = Math.min(100, Math.round(((t.protein || 0) / targets.protein) * 100));
  const cPct = Math.min(100, Math.round(((t.calories || 0) / targets.calories) * 100));
  const over = (t.calories || 0) > targets.calories;

  document.getElementById('mbProt').textContent = (t.protein || 0) + 'g';
  document.getElementById('mbCal').textContent  = (t.calories || 0).toLocaleString();
  document.getElementById('protBar').style.width = pPct + '%';
  document.getElementById('calBar').style.width  = cPct + '%';
  document.getElementById('calBar').className = 'mb-bar-fill cal' + (over ? ' over' : '');
  document.getElementById('mbProtLabel').textContent = (t.protein || 0) + ' / ' + targets.protein + 'g';
  document.getElementById('mbCalLabel').textContent  = (t.calories || 0).toLocaleString() + ' / ' + targets.calories.toLocaleString() + ' cal';
}

function renderFoods(foods) {
  const q = document.getElementById('searchInput').value.toLowerCase();
  const list = foods.filter(f => f.id !== 'f006' && (!q || f.name.toLowerCase().includes(q)));
  const container = document.getElementById('foodList');
  if (!list.length) {
    container.innerHTML = '<div class="empty">' + (q ? 'No foods match "' + q + '"' : 'No foods yet.') + '</div>';
    return;
  }
  container.innerHTML = list.map(f => `
    <div class="food-card">
      <div class="food-top">
        <span class="food-name">${f.name}</span>
        <span class="food-serving">${f.servingLabel}</span>
      </div>
      <div class="food-macros"><span class="prot">${f.protein}p</span> · ${f.calories} cal · ${f.carbs}c · ${f.fat}f</div>
      <div class="food-actions">
        <button class="serving-btn" onclick="adjustServing('${f.id}',-1)">&#8722;</button>
        <span class="serving-count" id="srv-${f.id}">1</span>
        <button class="serving-btn" onclick="adjustServing('${f.id}',1)">&#43;</button>
        <button class="log-food-btn" id="logBtn-${f.id}" onclick="logFood('${f.id}')">Log</button>
      </div>
    </div>`).join('');
}

function filterFoods(q) { renderFoods(foodsCache); }

function adjustServing(id, delta) {
  const el = document.getElementById('srv-' + id);
  el.textContent = Math.min(10, Math.max(1, parseInt(el.textContent) + delta));
}

async function logFood(foodId) {
  const food = foodsCache.find(f => f.id === foodId);
  if (!food) return;
  const servings = parseInt(document.getElementById('srv-' + foodId).textContent);
  const btn = document.getElementById('logBtn-' + foodId);
  btn.disabled = true; btn.textContent = '…'; btn.classList.add('logging');
  try {
    await apiPost({ action: 'logFood', foodId, servings });
    document.getElementById('srv-' + foodId).textContent = '1';
    showToast('Logged ' + food.name + (servings > 1 ? ' ×' + servings : ''));
    // Refresh macro bar
    const summary = await apiGet('getDaySummary');
    renderMacroBar(summary.totals);
  } catch (err) {
    showToast('Failed to log');
  } finally {
    btn.disabled = false; btn.textContent = 'Log'; btn.classList.remove('logging');
  }
}

// ---- Add New Food ----
function toggleAddFood() { document.getElementById('addFoodForm').classList.toggle('open'); }
function setBatchMode(batch, btn) {
  isBatchMode = batch;
  btn.parentElement.querySelectorAll('button').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
}
async function saveNewFood() {
  const name = document.getElementById('newFoodName').value.trim();
  if (!name) { alert('Enter a food name.'); return; }
  const body = {
    action: 'addFood', name,
    servingLabel: document.getElementById('newServingLabel').value.trim() || '1 serving',
    containers:   parseInt(document.getElementById('newContainers').value) || 1,
    isBatch: isBatchMode,
    protein:  parseFloat(document.getElementById('newProtein').value)  || 0,
    calories: parseFloat(document.getElementById('newCalories').value) || 0,
    carbs:    parseFloat(document.getElementById('newCarbs').value)    || 0,
    fat:      parseFloat(document.getElementById('newFat').value)      || 0,
    sugar:    parseFloat(document.getElementById('newSugar').value)    || 0,
    sodium:   parseFloat(document.getElementById('newSodium').value)   || 0
  };
  const btn = document.querySelector('.save-food-btn');
  btn.disabled = true; btn.textContent = 'Saving…';
  try {
    const result = await apiPost(body);
    if (result.success) {
      foodsCache.push(result.food);
      renderFoods(foodsCache);
      ['newFoodName','newProtein','newCalories','newCarbs','newFat','newSugar','newSodium'].forEach(id => {
        document.getElementById(id).value = '';
      });
      document.getElementById('newContainers').value = '1';
      document.getElementById('addFoodForm').classList.remove('open');
      showToast('Added ' + name + ' to library');
    }
  } catch (err) {
    showToast('Failed to save');
  } finally {
    btn.disabled = false; btn.textContent = 'Save to Library';
  }
}

function goHome() { window.location.href = 'index.html'; }

// ---- Barcode Scanner ----
let html5QrCode = null;

function openScanner() {
  document.getElementById('scannerOverlay').classList.add('open');
  document.getElementById('scanStatus').textContent = 'Starting camera…';
  html5QrCode = new Html5Qrcode('qrReader');
  html5QrCode.start(
    { facingMode: 'environment' },
    { fps: 10, qrbox: { width: 260, height: 130 } },
    onBarcodeScanned,
    () => {}
  ).then(() => {
    document.getElementById('scanStatus').textContent = 'Point camera at a barcode';
  }).catch(err => {
    document.getElementById('scanStatus').textContent = 'Camera error: ' + (err.message || err);
  });
}

async function onBarcodeScanned(barcode) {
  try { await html5QrCode.stop(); } catch {}
  document.getElementById('scanStatus').textContent = 'Found ' + barcode + ' — looking up…';
  try {
    const res = await fetch('https://world.openfoodfacts.org/api/v0/product/' + barcode + '.json');
    const data = await res.json();
    if (data.status !== 1 || !data.product) {
      document.getElementById('scanStatus').textContent = 'Product not found. Add it manually.';
      setTimeout(closeScanner, 2000);
      return;
    }
    const p = data.product;
    const n = p.nutriments || {};
    document.getElementById('newFoodName').value    = p.product_name || p.brands || '';
    document.getElementById('newServingLabel').value = p.serving_size || '1 serving';
    document.getElementById('newProtein').value     = Math.round(n.proteins_serving || 0);
    document.getElementById('newCalories').value    = Math.round(n['energy-kcal_serving'] || 0);
    document.getElementById('newCarbs').value       = Math.round(n.carbohydrates_serving || 0);
    document.getElementById('newFat').value         = Math.round(n.fat_serving || 0);
    document.getElementById('newSugar').value       = Math.round(n.sugars_serving || 0);
    document.getElementById('newSodium').value      = Math.round((n.sodium_serving || 0) * 1000);
    closeScanner();
    document.getElementById('addFoodForm').classList.add('open');
    showToast('Product found! Review and save.');
  } catch {
    document.getElementById('scanStatus').textContent = 'Lookup failed. Check connection.';
    setTimeout(closeScanner, 2000);
  }
}

function closeScanner() {
  if (html5QrCode) {
    html5QrCode.stop().catch(() => {});
    html5QrCode = null;
  }
  document.getElementById('scannerOverlay').classList.remove('open');
}

loadAll();
</script>
</body>
</html>
