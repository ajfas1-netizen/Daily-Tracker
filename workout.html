<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>The Grind – Workout</title>
  <style>
    :root {
      --bg: #0e0f11;
      --surface: #1a1b1e;
      --card: #21232a;
      --accent: #c8ff00;
      --accent-glow: rgba(200,255,0,0.1);
      --text: #f0f0f0;
      --dim: #888;
      --border: rgba(255,255,255,0.07);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      min-height: 100vh;
      padding-bottom: 90px;
    }

    /* ---- Header ---- */
    .header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 12px 16px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      position: sticky;
      top: 0;
      z-index: 50;
    }
    .header-left { display: flex; align-items: center; gap: 10px; }
    .back-btn {
      background: none; border: none; color: var(--dim);
      font-size: 22px; cursor: pointer; padding: 2px 6px 2px 0; line-height: 1;
    }
    .header-title { font-size: 13px; font-weight: 900; letter-spacing: 3px; color: #c8ff00; }
    .header-sub { font-size: 11px; color: var(--accent); font-weight: 700; letter-spacing: 1px; margin-top: 1px; }
    .timer { font-size: 20px; font-weight: 800; font-variant-numeric: tabular-nums; color: var(--accent); }

    /* ---- Day Tabs ---- */
    .day-tabs {
      display: flex;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
      scrollbar-width: none;
    }
    .day-tabs::-webkit-scrollbar { display: none; }
    .day-tab {
      flex-shrink: 0; padding: 10px 14px; background: none; border: none;
      color: var(--dim); font-size: 11px; font-weight: 700; letter-spacing: 0.5px;
      cursor: pointer; border-bottom: 2px solid transparent; transition: color 0.15s;
      white-space: nowrap;
    }
    .day-tab.active { color: var(--accent); border-bottom-color: var(--accent); }
    .day-tab.supplemental { border-left: 1px solid var(--border); }
    .suppl-hint {
      text-align: center; font-size: 11px; color: var(--dim);
      padding: 8px 0 14px; margin-bottom: 2px;
      letter-spacing: 0.3px;
    }

    /* ---- Content ---- */
    .content { padding: 14px 16px; max-width: 540px; margin: 0 auto; }

    /* ---- Progress ---- */
    .progress-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
    .progress-label { font-size: 12px; color: var(--dim); }
    .progress-pct { font-size: 12px; font-weight: 700; color: var(--accent); }
    .progress-bar-wrap { background: rgba(255,255,255,0.06); border-radius: 100px; height: 4px; margin-bottom: 16px; overflow: hidden; }
    .progress-bar-fill { height: 100%; background: var(--accent); border-radius: 100px; transition: width 0.4s; }

    /* ---- Exercise Card ---- */
    .exercise-card {
      background: var(--card);
      border-radius: 14px;
      padding: 14px;
      margin-bottom: 12px;
      border: 1px solid var(--border);
      transition: opacity 0.2s;
    }
    .exercise-card.skipped { opacity: 0.38; }

    .ex-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 4px; }
    .ex-name { font-size: 15px; font-weight: 700; flex: 1; line-height: 1.3; }
    .ex-muscle {
      font-size: 10px; font-weight: 700; color: var(--dim);
      background: rgba(255,255,255,0.06); border-radius: 6px;
      padding: 3px 8px; margin-left: 10px; white-space: nowrap; flex-shrink: 0;
    }
    .ex-last { font-size: 12px; color: var(--dim); margin-bottom: 12px; display: flex; align-items: center; flex-wrap: wrap; gap: 6px; }
    .ex-last .last-val { color: var(--accent); font-weight: 600; }
    .ex-pr { color: #a78bfa; font-weight: 600; }
    .ex-pr-badge {
      display: none; background: rgba(200,255,0,0.15); border: 1px solid var(--accent);
      color: var(--accent); font-size: 10px; font-weight: 800;
      padding: 2px 7px; border-radius: 6px; letter-spacing: 0.5px;
    }

    /* ---- Set Rows ---- */
    .sets-container { display: flex; flex-direction: column; gap: 8px; margin-bottom: 10px; }

    .set-row {
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(255,255,255,0.05);
      border-radius: 10px;
      padding: 9px 10px;
      transition: border-color 0.2s;
    }
    .set-row.pr-set { border-color: rgba(200,255,0,0.3); }
    .set-row-top {
      display: flex; align-items: center; gap: 6px; margin-bottom: 8px;
    }
    .set-num { font-size: 12px; color: var(--dim); min-width: 16px; font-weight: 600; }
    .set-input {
      background: var(--surface);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 8px;
      color: var(--text);
      font-size: 15px;
      font-weight: 700;
      padding: 7px 6px;
      text-align: center;
      width: 60px;
    }
    .set-input:focus { outline: none; border-color: var(--accent); }
    .set-x { font-size: 13px; color: var(--dim); flex-shrink: 0; }
    .set-del {
      margin-left: auto; background: none; border: none;
      color: rgba(255,255,255,0.18); font-size: 15px; cursor: pointer; padding: 2px 4px;
    }
    .set-del:active { color: #ff5555; }

    .feel-row { display: flex; gap: 6px; }
    .feel-btn {
      flex: 1; padding: 8px 0; background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.1); border-radius: 7px;
      font-size: 11px; font-weight: 700; color: var(--dim); cursor: pointer;
      transition: all 0.15s; letter-spacing: 0.3px;
    }
    .feel-btn.active-easy  { background: rgba(76,175,80,0.2);  border-color: #4caf50; color: #4caf50; }
    .feel-btn.active-good  { background: rgba(200,255,0,0.12); border-color: var(--accent); color: var(--accent); }
    .feel-btn.active-hard  { background: rgba(255,152,0,0.2);  border-color: #ff9800; color: #ff9800; }
    .feel-btn.active-max   { background: rgba(244,67,54,0.2);  border-color: #f44336; color: #f44336; }

    /* ---- Card Actions ---- */
    .ex-actions { display: flex; gap: 8px; }
    .add-set-btn {
      background: none; border: 1px solid rgba(255,255,255,0.12); border-radius: 8px;
      color: var(--text); font-size: 13px; font-weight: 700; padding: 8px 16px; cursor: pointer;
    }
    .add-set-btn:active { background: rgba(255,255,255,0.06); }
    .skip-btn {
      background: none; border: 1px solid rgba(255,255,255,0.08); border-radius: 8px;
      color: var(--dim); font-size: 13px; font-weight: 600; padding: 8px 16px;
      cursor: pointer; margin-left: auto;
    }
    .skip-btn.active { color: var(--accent); border-color: var(--accent); }

    /* ---- Rest Timer Bar ---- */
    .rest-bar {
      position: fixed; bottom: 74px;
      left: 50%; transform: translateX(-50%);
      width: calc(100% - 24px); max-width: 516px;
      background: rgba(14,15,17,0.97); border: 1px solid var(--accent);
      border-radius: 14px; padding: 10px 14px;
      display: none; align-items: center; gap: 10px;
      z-index: 45; box-shadow: 0 0 24px rgba(200,255,0,0.14);
      backdrop-filter: blur(8px);
    }
    .rest-countdown-wrap { display: flex; flex-direction: column; align-items: center; flex-shrink: 0; }
    .rest-time { font-size: 22px; font-weight: 800; color: var(--accent); font-variant-numeric: tabular-nums; line-height: 1; }
    .rest-label-sm { font-size: 9px; color: var(--dim); text-transform: uppercase; letter-spacing: 1px; margin-top: 2px; }
    .rest-progress-wrap { flex: 1; height: 4px; background: rgba(255,255,255,0.08); border-radius: 2px; overflow: hidden; }
    .rest-progress-fill { height: 100%; background: var(--accent); border-radius: 2px; transition: width 1s linear; }
    .rest-btn {
      background: rgba(255,255,255,0.07); border: 1px solid rgba(255,255,255,0.1);
      border-radius: 7px; color: var(--text); font-size: 11px; font-weight: 700;
      padding: 6px 10px; cursor: pointer; white-space: nowrap; flex-shrink: 0;
    }
    .rest-btn:active { background: rgba(255,255,255,0.15); }

    /* ---- Finish Button ---- */
    .finish-wrap {
      position: fixed; bottom: 0; left: 0; right: 0;
      padding: 10px 16px 18px;
      background: linear-gradient(to top, var(--bg) 70%, transparent);
      z-index: 40;
    }
    .finish-btn {
      width: 100%; max-width: 540px; display: block; margin: 0 auto;
      background: var(--accent); color: #000; border: none; border-radius: 12px;
      padding: 16px; font-size: 16px; font-weight: 800; cursor: pointer; letter-spacing: 0.3px;
    }
    .finish-btn:active { opacity: 0.85; }

    /* ---- Loading ---- */
    .loading { text-align: center; padding: 60px 20px; color: var(--dim); }
    .spinner {
      width: 32px; height: 32px;
      border: 3px solid rgba(255,255,255,0.08);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 14px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ---- Success Screen ---- */
    .success-screen {
      display: none; text-align: center; padding: 48px 24px;
      max-width: 420px; margin: 0 auto;
    }
    .success-screen.visible { display: block; }
    .success-icon { font-size: 52px; margin-bottom: 12px; }
    .success-title { font-size: 28px; font-weight: 800; margin-bottom: 4px; }
    .success-day { font-size: 13px; color: var(--accent); font-weight: 700; letter-spacing: 1.5px; margin-bottom: 16px; }
    .success-pr-line { font-size: 16px; font-weight: 800; color: var(--accent); margin-bottom: 24px; min-height: 24px; }
    .success-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 32px; }
    .stat-box { background: var(--card); border-radius: 12px; padding: 16px 12px; }
    .stat-val { font-size: 26px; font-weight: 800; color: var(--accent); line-height: 1; }
    .stat-label { font-size: 11px; color: var(--dim); margin-top: 5px; font-weight: 600; letter-spacing: 0.5px; }
    .home-btn {
      width: 100%; background: var(--accent); color: #000; border: none;
      border-radius: 12px; padding: 16px; font-size: 16px; font-weight: 800; cursor: pointer;
    }

    /* ---- Confirm Dialog ---- */
    .overlay {
      display: none; position: fixed; inset: 0;
      background: rgba(0,0,0,0.72); z-index: 100;
      justify-content: center; align-items: center; padding: 24px;
    }
    .overlay.open { display: flex; }
    .dialog {
      background: var(--card); border-radius: 16px; padding: 24px;
      width: 100%; max-width: 340px; text-align: center;
    }
    .dialog h3 { font-size: 19px; font-weight: 800; margin-bottom: 6px; }
    .dialog p { font-size: 14px; color: var(--dim); margin-bottom: 22px; line-height: 1.4; }
    .dialog-btns { display: flex; gap: 10px; }
    .dialog-btns button {
      flex: 1; padding: 13px; border-radius: 10px; border: none;
      font-size: 15px; font-weight: 700; cursor: pointer;
    }
    .btn-cancel { background: rgba(255,255,255,0.08); color: var(--text); }
    .btn-confirm { background: var(--accent); color: #000; }

    /* ---- Plan Mode ---- */
    .plan-header { text-align: center; padding: 4px 0 16px; }
    .plan-day-label { font-size: 13px; font-weight: 900; letter-spacing: 3px; color: var(--accent); }
    .plan-subtitle { font-size: 11px; color: var(--dim); margin-top: 4px; }

    .plan-ex-card {
      display: flex; align-items: center; gap: 12px;
      background: var(--card); border: 1px solid rgba(255,255,255,0.05);
      border-radius: 12px; padding: 12px 14px; margin-bottom: 8px;
      cursor: pointer; transition: all 0.15s; opacity: 0.35;
    }
    .plan-ex-card.selected {
      opacity: 1; border-color: rgba(200,255,0,0.22);
      background: rgba(200,255,0,0.04);
    }
    .plan-check {
      width: 26px; height: 26px; border-radius: 8px; flex-shrink: 0;
      border: 2px solid rgba(255,255,255,0.15);
      display: flex; align-items: center; justify-content: center;
      font-size: 13px; font-weight: 900; color: transparent; transition: all 0.15s;
    }
    .plan-ex-card.selected .plan-check { background: var(--accent); border-color: var(--accent); color: #000; }
    .plan-ex-info { flex: 1; min-width: 0; }
    .plan-ex-name { font-size: 14px; font-weight: 700; }
    .plan-ex-last { font-size: 11px; color: var(--dim); margin-top: 3px; }
    .plan-ex-muscle {
      font-size: 10px; font-weight: 700; color: var(--dim);
      background: rgba(255,255,255,0.06); border-radius: 6px;
      padding: 3px 8px; flex-shrink: 0;
    }
    .plan-count {
      text-align: center; font-size: 11px; color: var(--dim);
      padding: 10px 0 4px; letter-spacing: 0.3px;
    }
  </style>
</head>
<body>

<!-- Header -->
<div class="header">
  <div class="header-left">
    <button class="back-btn" onclick="goHome()">&#8592;</button>
    <div>
      <div class="header-title">THE GRIND</div>
      <div class="header-sub" id="headerDay">WORKOUT</div>
    </div>
  </div>
  <div class="timer" id="timerDisplay">0:00</div>
</div>

<!-- Day Tabs -->
<div class="day-tabs" id="dayTabs">
  <button class="day-tab" data-day="CHEST"      onclick="switchDay('CHEST')">CHEST</button>
  <button class="day-tab" data-day="PULL"       onclick="switchDay('PULL')">PULL</button>
  <button class="day-tab" data-day="SHOULDERS"  onclick="switchDay('SHOULDERS')">SHLDR</button>
  <button class="day-tab" data-day="LEGS"       onclick="switchDay('LEGS')">LEGS</button>
  <button class="day-tab supplemental" data-day="FUNCTIONAL" onclick="switchDay('FUNCTIONAL')">FUNC</button>
  <button class="day-tab supplemental" data-day="CORE"       onclick="switchDay('CORE')">CORE</button>
</div>

<!-- Main Content -->
<div class="content" id="mainContent">
  <div class="loading" id="loadingState">
    <div class="spinner"></div>
    <div>Loading workout...</div>
  </div>
</div>

<!-- Success Screen -->
<div class="success-screen" id="successScreen">
  <div class="success-icon">&#128170;</div>
  <div class="success-title">Workout Done!</div>
  <div class="success-day" id="successDay"></div>
  <div class="success-pr-line" id="successPRLine"></div>
  <div class="success-grid">
    <div class="stat-box">
      <div class="stat-val" id="successTime">—</div>
      <div class="stat-label">DURATION</div>
    </div>
    <div class="stat-box">
      <div class="stat-val" id="successSets">—</div>
      <div class="stat-label">SETS</div>
    </div>
    <div class="stat-box">
      <div class="stat-val" id="successExercises">—</div>
      <div class="stat-label">EXERCISES</div>
    </div>
    <div class="stat-box">
      <div class="stat-val" id="successVolume">—</div>
      <div class="stat-label">VOLUME (LBS)</div>
    </div>
  </div>
  <button class="home-btn" onclick="goHome()">&#8592; Back to The Grind</button>
</div>

<!-- Rest Timer Bar -->
<div class="rest-bar" id="restBar">
  <div class="rest-countdown-wrap">
    <div class="rest-time" id="restCountdown">1:30</div>
    <div class="rest-label-sm">Rest</div>
  </div>
  <div class="rest-progress-wrap">
    <div class="rest-progress-fill" id="restProgressFill" style="width:100%"></div>
  </div>
  <button class="rest-btn" onclick="addRestTime(30)">+30s</button>
  <button class="rest-btn" onclick="skipRest()">Skip</button>
</div>

<!-- Finish Button -->
<div class="finish-wrap" id="finishWrap" style="display:none;">
  <button class="finish-btn" onclick="confirmFinish()">Finish Workout</button>
</div>

<!-- Confirm Dialog -->
<div class="overlay" id="confirmOverlay">
  <div class="dialog">
    <h3>Finish Workout?</h3>
    <p>All logged sets will be saved. Skipped and empty sets are ignored.</p>
    <div class="dialog-btns">
      <button class="btn-cancel" onclick="closeOverlay()">Keep Going</button>
      <button class="btn-confirm" onclick="submitWorkout()">Save It</button>
    </div>
  </div>
</div>

<script>
const API = 'https://script.google.com/macros/s/AKfycbzEcwU-CfMajZdxUVN2a823tPG85IOjhTK7_akWmkJ7oGvOM1Jt6RvbI2-RMwykECu_XQ/exec';

let allExercises = [];
let exNameMap = {};       // sanitizedId → actualName
let exerciseState = {};   // actualName → { sets: [{weight,reps,feel}], skipped: bool }
let exercisePRs = {};     // actualName → all-time max weight
let lastSessionMap = {};  // actualName → { sets, reps, weight } from most recent session
let currentDay = 'CHEST';
let primaryDay = 'CHEST';
let timerInterval = null;
let startTime = null;
let planMode = true;
let selectedExNames = new Set();

// ---- Workout Timer ----
function startTimer() {
  startTime = Date.now();
  timerInterval = setInterval(tickTimer, 1000);
}
function tickTimer() {
  const elapsed = Math.floor((Date.now() - startTime) / 1000);
  document.getElementById('timerDisplay').textContent = formatTime(elapsed);
}
function formatTime(secs) {
  const m = Math.floor(secs / 60);
  const s = secs % 60;
  return m + ':' + String(s).padStart(2, '0');
}
function getElapsedStr() {
  if (!startTime) return '0:00';
  return formatTime(Math.floor((Date.now() - startTime) / 1000));
}

// ---- Rest Timer ----
let restInterval = null;
let restTimeLeft = 0;
const REST_DEFAULT = 90;

function startRestTimer() {
  clearInterval(restInterval);
  restTimeLeft = REST_DEFAULT;
  updateRestDisplay();
  document.getElementById('restBar').style.display = 'flex';
  restInterval = setInterval(() => {
    restTimeLeft--;
    updateRestDisplay();
    if (restTimeLeft <= 0) {
      clearInterval(restInterval);
      if ('vibrate' in navigator) navigator.vibrate([150, 100, 200]);
      setTimeout(hideRestTimer, 1200);
    }
  }, 1000);
}

function hideRestTimer() {
  clearInterval(restInterval);
  document.getElementById('restBar').style.display = 'none';
}

function skipRest() { hideRestTimer(); }

function addRestTime(s) {
  restTimeLeft += s;
  updateRestDisplay();
}

function updateRestDisplay() {
  const secs = Math.max(0, restTimeLeft);
  const m = Math.floor(secs / 60);
  const s = secs % 60;
  document.getElementById('restCountdown').textContent = m + ':' + String(s).padStart(2, '0');
  const pct = Math.max(0, Math.min(100, (restTimeLeft / REST_DEFAULT) * 100));
  document.getElementById('restProgressFill').style.width = pct + '%';
}

// ---- Helpers ----
function sanitizeId(name) {
  return name.replace(/[^a-zA-Z0-9]/g, '_');
}

// ---- Build last-session map ----
function buildLastSessionMap(history) {
  const map = {};
  (Array.isArray(history) ? history : []).forEach(session => {
    const byEx = {};
    (session.sets || []).forEach(s => {
      if (!byEx[s.exerciseName]) byEx[s.exerciseName] = [];
      byEx[s.exerciseName].push(s);
    });
    Object.entries(byEx).forEach(([name, sets]) => {
      if (!map[name]) {
        const repsArr = sets.map(s => parseInt(s.reps) || 0).filter(r => r > 0);
        const avgReps = repsArr.length
          ? Math.round(repsArr.reduce((a, b) => a + b, 0) / repsArr.length)
          : 0;
        const maxW = Math.max(...sets.map(s => parseFloat(s.weight) || 0));
        map[name] = { sets: sets.length, reps: avgReps, weight: maxW };
      }
    });
  });
  return map;
}

// ---- Load ----
async function loadWorkout() {
  try {
    const [workoutRes, histRes] = await Promise.all([
      fetch(API + '?action=getNextWorkout').then(r => r.json()),
      fetch(API + '?action=getWorkoutHistory').then(r => r.json()).catch(() => [])
    ]);
    const data = workoutRes;

    if (data.error) { showError(data.error); return; }

    allExercises = data.exercises || [];

    if (allExercises.length === 0) {
      showError('No exercises found. Run setupWorkoutSheets() in Apps Script editor first, then redeploy.');
      return;
    }

    lastSessionMap = buildLastSessionMap(histRes);

    allExercises.forEach(ex => {
      exNameMap[sanitizeId(ex.name)] = ex.name;
      if (ex.prWeight !== null && ex.prWeight !== undefined) {
        exercisePRs[ex.name] = ex.prWeight;
      }
    });

    primaryDay = data.nextDay || 'CHEST';
    currentDay = primaryDay;
    showPlanScreen(primaryDay);
  } catch (err) {
    showError('Could not load workout. Check your connection and try again.');
  }
}

function showPlanScreen(day) {
  planMode = true;
  document.getElementById('dayTabs').style.display = 'none';
  document.getElementById('headerDay').textContent = day + ' DAY';

  const dayExercises = allExercises.filter(e => e.day === day);
  selectedExNames = new Set(dayExercises.map(e => e.name));

  renderPlanScreen(dayExercises);

  const wrap = document.getElementById('finishWrap');
  wrap.style.display = 'block';
  wrap.innerHTML = '<button class="finish-btn" onclick="startFromPlan()">Begin Workout &#8594;</button>';
}

function renderPlanScreen(dayExercises) {
  const container = document.getElementById('mainContent');
  let html = `
    <div class="plan-header">
      <div class="plan-day-label">${currentDay} DAY</div>
      <div class="plan-subtitle">Select exercises — tap to deselect</div>
    </div>`;

  dayExercises.forEach(ex => {
    const sid = sanitizeId(ex.name);
    const lastSess = lastSessionMap[ex.name];
    let lastStr = '';
    if (lastSess && lastSess.weight > 0 && lastSess.sets > 0 && lastSess.reps > 0) {
      const side = ex.isPerSide ? '/side' : '';
      lastStr = 'Last: ' + lastSess.sets + '×' + lastSess.reps + ' @ ' + lastSess.weight + ' lbs' + side;
    } else if (ex.lastWeight) {
      lastStr = 'Last: ' + ex.lastWeight + ' lbs';
    }

    html += `
    <div class="plan-ex-card selected" id="plancard_${sid}" onclick="togglePlanEx('${sid}', '${ex.name.replace(/'/g, "\\'")}')">
      <div class="plan-check">&#10003;</div>
      <div class="plan-ex-info">
        <div class="plan-ex-name">${ex.name}</div>
        ${lastStr ? `<div class="plan-ex-last">${lastStr}</div>` : ''}
      </div>
      <div class="plan-ex-muscle">${ex.muscleGroup}</div>
    </div>`;
  });

  html += '<div class="plan-count" id="planCount">' + dayExercises.length + ' of ' + dayExercises.length + ' selected</div>';
  html += '<div style="height:20px"></div>';
  container.innerHTML = html;
}

function togglePlanEx(sid, name) {
  if (selectedExNames.has(name)) {
    selectedExNames.delete(name);
    const card = document.getElementById('plancard_' + sid);
    if (card) card.classList.remove('selected');
  } else {
    selectedExNames.add(name);
    const card = document.getElementById('plancard_' + sid);
    if (card) card.classList.add('selected');
  }
  const dayExCount = allExercises.filter(e => e.day === currentDay).length;
  const countEl = document.getElementById('planCount');
  if (countEl) countEl.textContent = selectedExNames.size + ' of ' + dayExCount + ' selected';
}

function startFromPlan() {
  planMode = false;
  // Remove deselected exercises from the primary day only (keep supplemental days intact)
  allExercises = allExercises.filter(e => e.day !== primaryDay || selectedExNames.has(e.name));
  // Rebuild exNameMap after filter
  exNameMap = {};
  allExercises.forEach(ex => { exNameMap[sanitizeId(ex.name)] = ex.name; });

  document.getElementById('dayTabs').style.display = 'flex';
  document.getElementById('finishWrap').innerHTML = '<button class="finish-btn" onclick="confirmFinish()">Finish Workout</button>';
  selectDay(currentDay);
  document.getElementById('finishWrap').style.display = 'block';
  startTimer();
}

function showError(msg) {
  document.getElementById('mainContent').innerHTML =
    `<div class="loading">
       <div style="color:#ff6b6b;font-size:14px;margin-bottom:16px;">${msg}</div>
       <button onclick="loadWorkout()" style="padding:10px 24px;background:var(--accent);color:#000;border:none;border-radius:8px;font-size:14px;font-weight:700;cursor:pointer;">Retry</button>
     </div>`;
}

// ---- Day Switching ----
function switchDay(day) { selectDay(day); }

function selectDay(day) {
  currentDay = day;
  document.getElementById('headerDay').textContent = day + ' DAY';

  document.querySelectorAll('.day-tab').forEach(btn => {
    btn.classList.toggle('active', btn.dataset.day === day);
  });

  const dayExercises = allExercises.filter(e => e.day === day);

  dayExercises.forEach(ex => {
    if (!exerciseState[ex.name]) {
      const defaultW = (ex.lastWeight !== null && ex.lastWeight !== undefined)
        ? ex.lastWeight : (ex.defaultWeight || '');
      exerciseState[ex.name] = {
        skipped: false,
        sets: [{ weight: defaultW, reps: '', feel: '' }]
      };
    }
  });

  renderExercises(dayExercises);
}

// ---- Render ----
function renderExercises(exercises) {
  const container = document.getElementById('mainContent');

  if (exercises.length === 0) {
    container.innerHTML = '<div class="loading"><div style="font-size:14px;">No exercises for this day.</div></div>';
    return;
  }

  const { done, total } = progressCount(exercises);
  const pct = total ? Math.round((done / total) * 100) : 0;
  const isSupplemental = ['FUNCTIONAL', 'CORE'].includes(currentDay);

  let html = `
    <div class="progress-row">
      <span class="progress-label">${done} of ${total} exercises</span>
      <span class="progress-pct">${pct}%</span>
    </div>
    <div class="progress-bar-wrap">
      <div class="progress-bar-fill" id="progressFill" style="width:${pct}%"></div>
    </div>
    ${isSupplemental ? '<div class="suppl-hint">Pick 1–2 to add to your session — they save with your workout</div>' : ''}`;

  exercises.forEach(ex => {
    const sid = sanitizeId(ex.name);
    const state = exerciseState[ex.name] || { skipped: false, sets: [{ weight: '', reps: '', feel: '' }] };
    const pr = exercisePRs[ex.name];

    let lastStr;
    const lastSess = lastSessionMap[ex.name];
    if (lastSess && lastSess.weight > 0 && lastSess.sets > 0 && lastSess.reps > 0) {
      const side = ex.isPerSide ? '/side' : '';
      lastStr = lastSess.sets + '×' + lastSess.reps + ' @ ' + lastSess.weight + ' lbs' + side;
    } else if (ex.lastWeight !== null && ex.lastWeight !== undefined && ex.lastWeight !== '') {
      lastStr = ex.isPerSide ? ex.lastWeight + ' lbs/side' : ex.lastWeight + ' lbs';
    } else if (ex.defaultWeight) {
      lastStr = 'est. ' + ex.defaultWeight + (ex.isPerSide ? ' lbs/side' : ' lbs');
    } else {
      lastStr = 'bodyweight';
    }

    const prStr = pr ? (ex.isPerSide ? pr + ' lbs/side' : pr + ' lbs') : null;

    html += `
    <div class="exercise-card${state.skipped ? ' skipped' : ''}" id="card_${sid}">
      <div class="ex-header">
        <div class="ex-name">${ex.name}</div>
        <div class="ex-muscle">${ex.muscleGroup}</div>
      </div>
      <div class="ex-last">
        Last: <span class="last-val">${lastStr}</span>
        ${prStr ? '&nbsp;·&nbsp; PR: <span class="ex-pr">' + prStr + '</span>' : ''}
        <span class="ex-pr-badge" id="pr_badge_${sid}">🏆 NEW PR!</span>
      </div>
      <div class="sets-container" id="sets_${sid}">
        ${state.sets.map((s, i) => renderSetRow(sid, i, s, ex.name)).join('')}
      </div>
      <div class="ex-actions">
        <button class="add-set-btn" onclick="addSet('${sid}')">+ Set</button>
        <button class="skip-btn${state.skipped ? ' active' : ''}" id="skipBtn_${sid}" onclick="toggleSkip('${sid}')">${state.skipped ? 'Undo' : 'Skip'}</button>
      </div>
    </div>`;
  });

  container.innerHTML = html;
}

function renderSetRow(sid, idx, set, exName) {
  const pr = exName ? (exercisePRs[exName] || 0) : 0;
  const w = parseFloat(set.weight) || 0;
  const isPR = w > 0 && pr > 0 && w > pr;
  const feels = ['Easy', 'Good', 'Hard', 'Max'];
  const feelBtns = feels.map(f => {
    const cls = set.feel === f ? ' active-' + f.toLowerCase() : '';
    return `<button class="feel-btn${cls}" onclick="setFeel('${sid}',${idx},'${f}')">${f}</button>`;
  }).join('');

  return `
  <div class="set-row${isPR ? ' pr-set' : ''}" id="setrow_${sid}_${idx}">
    <div class="set-row-top">
      <span class="set-num">${idx + 1}</span>
      <input class="set-input" type="number" inputmode="decimal" placeholder="lbs"
        value="${set.weight !== '' ? set.weight : ''}"
        onchange="updateSet('${sid}',${idx},'weight',this.value)"
        onblur="updateSet('${sid}',${idx},'weight',this.value)">
      <span class="set-x">&#215;</span>
      <input class="set-input" type="number" inputmode="numeric" placeholder="reps"
        value="${set.reps !== '' ? set.reps : ''}"
        onchange="updateSet('${sid}',${idx},'reps',this.value)"
        onblur="updateSet('${sid}',${idx},'reps',this.value)">
      <button class="set-del" onclick="removeSet('${sid}',${idx})">&#10005;</button>
    </div>
    <div class="feel-row">${feelBtns}</div>
  </div>`;
}

// ---- State Updates ----
function updateSet(sid, idx, field, value) {
  const exName = exNameMap[sid];
  if (!exName || !exerciseState[exName] || !exerciseState[exName].sets[idx]) return;
  if (field === 'weight' || field === 'reps') {
    exerciseState[exName].sets[idx][field] = value === '' ? '' : (parseFloat(value) || '');
  } else {
    exerciseState[exName].sets[idx][field] = value;
  }

  // PR detection on weight change
  if (field === 'weight') {
    const newW = parseFloat(value) || 0;
    const pr   = exercisePRs[exName] || 0;
    const badge = document.getElementById('pr_badge_' + sid);
    if (badge) badge.style.display = (newW > pr && newW > 0) ? 'inline' : 'none';
    // highlight the set row
    const row = document.getElementById('setrow_' + sid + '_' + idx);
    if (row) row.classList.toggle('pr-set', newW > pr && newW > 0);
  }

  updateProgress();
}

function setFeel(sid, idx, feel) {
  const exName = exNameMap[sid];
  if (!exName || !exerciseState[exName]) return;
  exerciseState[exName].sets[idx].feel = feel;
  const setsContainer = document.getElementById('sets_' + sid);
  if (setsContainer) {
    const sets = exerciseState[exName].sets;
    setsContainer.innerHTML = sets.map((s, i) => renderSetRow(sid, i, s, exName)).join('');
  }
  updateProgress();
}

function addSet(sid) {
  const exName = exNameMap[sid];
  if (!exName || !exerciseState[exName]) return;
  const sets = exerciseState[exName].sets;
  const last = sets[sets.length - 1];
  sets.push({ weight: last ? last.weight : '', reps: '', feel: '' });
  const container = document.getElementById('sets_' + sid);
  if (container) container.innerHTML = sets.map((s, i) => renderSetRow(sid, i, s, exName)).join('');
  startRestTimer();
}

function removeSet(sid, idx) {
  const exName = exNameMap[sid];
  if (!exName || !exerciseState[exName]) return;
  const sets = exerciseState[exName].sets;
  if (sets.length <= 1) return;
  sets.splice(idx, 1);
  const container = document.getElementById('sets_' + sid);
  if (container) container.innerHTML = sets.map((s, i) => renderSetRow(sid, i, s, exName)).join('');
  updateProgress();
}

function toggleSkip(sid) {
  const exName = exNameMap[sid];
  if (!exName || !exerciseState[exName]) return;
  exerciseState[exName].skipped = !exerciseState[exName].skipped;
  const skipped = exerciseState[exName].skipped;
  const card = document.getElementById('card_' + sid);
  const btn = document.getElementById('skipBtn_' + sid);
  if (card) card.classList.toggle('skipped', skipped);
  if (btn) { btn.textContent = skipped ? 'Undo' : 'Skip'; btn.classList.toggle('active', skipped); }
  updateProgress();
}

// ---- Progress ----
function progressCount(exercises) {
  let done = 0;
  exercises.forEach(ex => {
    const state = exerciseState[ex.name];
    if (!state) return;
    if (state.skipped) { done++; return; }
    if (state.sets.some(s => s.reps !== '' && s.reps !== 0)) done++;
  });
  return { done, total: exercises.length };
}

function updateProgress() {
  const dayEx = allExercises.filter(e => e.day === currentDay);
  const { done, total } = progressCount(dayEx);
  const pct = total ? Math.round((done / total) * 100) : 0;
  const fill = document.getElementById('progressFill');
  const label = document.querySelector('.progress-label');
  const pctEl = document.querySelector('.progress-pct');
  if (fill) fill.style.width = pct + '%';
  if (label) label.textContent = done + ' of ' + total + ' exercises';
  if (pctEl) pctEl.textContent = pct + '%';
}

// ---- Finish ----
function confirmFinish() { document.getElementById('confirmOverlay').classList.add('open'); }
function closeOverlay()  { document.getElementById('confirmOverlay').classList.remove('open'); }

async function submitWorkout() {
  closeOverlay();
  clearInterval(timerInterval);
  hideRestTimer();
  const duration = getElapsedStr();

  const date = new Date().toISOString().split('T')[0];
  const sessionId = 'sess_' + Date.now();
  const sets = [];

  Object.keys(exerciseState).forEach(exName => {
    const state = exerciseState[exName];
    if (!state || state.skipped) return;
    state.sets.forEach((s, idx) => {
      if (s.reps === '' || parseInt(s.reps) === 0) return;
      sets.push({
        exerciseName: exName,
        setNumber: idx + 1,
        weight: s.weight !== '' ? parseFloat(s.weight) || 0 : 0,
        reps: parseInt(s.reps) || 0,
        feel: s.feel || 'Good'
      });
    });
  });

  const totalSets = sets.length;
  const exercisesDone = new Set(sets.map(s => s.exerciseName)).size;
  const totalVolume = Math.round(sets.reduce((sum, s) => sum + s.weight * s.reps, 0));

  // Detect new PRs
  const newPRNames = [];
  sets.forEach(s => {
    const pr = exercisePRs[s.exerciseName] || 0;
    if (s.weight > 0 && s.weight > pr && !newPRNames.includes(s.exerciseName)) {
      newPRNames.push(s.exerciseName);
    }
  });

  const supplementalDone = ['FUNCTIONAL', 'CORE'].filter(d =>
    allExercises.filter(e => e.day === d).some(e => {
      const st = exerciseState[e.name];
      return st && !st.skipped && st.sets.some(s => s.reps !== '' && parseInt(s.reps) > 0);
    })
  );
  const dayLabel = supplementalDone.length > 0
    ? primaryDay + ' + ' + supplementalDone.join(' + ')
    : primaryDay;

  document.getElementById('mainContent').style.display = 'none';
  document.getElementById('finishWrap').style.display = 'none';
  document.getElementById('dayTabs').style.display = 'none';
  document.getElementById('successDay').textContent = dayLabel;
  document.getElementById('successPRLine').textContent =
    newPRNames.length > 0 ? '🏆 ' + newPRNames.length + ' new PR' + (newPRNames.length > 1 ? 's' : '') + '!' : '';
  document.getElementById('successTime').textContent = duration;
  document.getElementById('successSets').textContent = totalSets;
  document.getElementById('successExercises').textContent = exercisesDone;
  document.getElementById('successVolume').textContent = totalVolume.toLocaleString();
  document.getElementById('successScreen').classList.add('visible');

  if (sets.length > 0) {
    try {
      await fetch(API, {
        method: 'POST',
        headers: { 'Content-Type': 'text/plain;charset=utf-8' },
        body: JSON.stringify({ action: 'logWorkoutSession', sessionId, date, dayName: primaryDay, sets })
      });
    } catch (e) { /* best effort */ }
  }
}

function goHome() { window.location.href = 'index.html'; }

loadWorkout();
</script>
