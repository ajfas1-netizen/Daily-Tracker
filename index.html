<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>The Grind</title>
<!-- v11 -->
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="The Grind">
<meta name="theme-color" content="#0b1120">
<link rel="manifest" href="manifest.json">
<style>
  :root {
    --bg: #0b1120;
    --card: #111a2e;
    --card2: #162036;
    --border: #1e2d4a;
    --text: #e4e8f1;
    --dim: #6b7a99;
    --accent: #3b82f6;
    --accent-glow: rgba(59,130,246,0.25);
    --green: #22c55e;
    --green-glow: rgba(34,197,94,0.25);
    --orange: #f59e0b;
    --red: #ef4444;
    --coffee-bg: linear-gradient(135deg, #5d4037, #8d6e63);
    --water-bg: linear-gradient(135deg, #1d4ed8, #3b82f6);
    --coors-bg: linear-gradient(135deg, #d97706, #f59e0b);
    --coors-text: #1a1a1a;
    --bourbon-bg: linear-gradient(135deg, #b91c1c, #dc2626);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
    background: var(--bg);
    color: var(--text);
    max-width: 480px;
    margin: 0 auto;
    padding: 12px 16px 100px;
    min-height: 100vh;
    -webkit-user-select: none;
    user-select: none;
  }

  /* --- Header --- */
  .header {
    text-align: center;
    margin-bottom: 20px;
    padding: 8px 0;
    position: relative;
  }
  .header h1 {
    font-size: 22px;
    font-weight: 800;
    background: linear-gradient(135deg, #3b82f6, #60a5fa);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    letter-spacing: 0.5px;
  }
  .refresh-btn {
    position: absolute;
    right: 16px;
    top: 14px;
    background: none;
    border: 1px solid var(--border);
    border-radius: 50%;
    width: 36px;
    height: 36px;
    color: var(--dim);
    font-size: 18px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .refresh-btn:active { color: var(--accent); }
  .header .date {
    font-size: 13px;
    color: var(--dim);
    margin-top: 2px;
  }

  /* --- Status Banner --- */
  .status-banner {
    text-align: center;
    padding: 8px;
    font-size: 12px;
    border-radius: 10px;
    margin-bottom: 12px;
    display: none;
  }
  .status-banner.loading { display: block; background: var(--border); color: var(--dim); }
  .status-banner.error { display: block; background: rgba(255,107,107,0.15); color: var(--red); }
  .status-banner.success { display: block; background: rgba(0,184,148,0.15); color: var(--green); }

  /* --- Yesterday's Feedback --- */
  .feedback-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 14px 16px;
    margin-bottom: 16px;
    display: none;
  }
  .feedback-card.show { display: block; }
  .feedback-title {
    font-size: 12px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: var(--dim);
    margin-bottom: 10px;
  }
  .feedback-item {
    font-size: 13px;
    line-height: 1.5;
    padding: 6px 0;
    border-bottom: 1px solid rgba(255,255,255,0.04);
  }
  .feedback-item:last-child { border-bottom: none; }
  .feedback-icon { margin-right: 6px; }

  /* --- Daily Totals --- */
  .totals {
    background: var(--card);
    border-radius: 16px;
    padding: 18px;
    margin-bottom: 16px;
    border: 1px solid var(--border);
    box-shadow: 0 4px 24px rgba(0,0,0,0.3);
  }

  .macro-row { margin-bottom: 14px; }
  .macro-row:last-of-type { margin-bottom: 0; }

  .macro-header {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    margin-bottom: 6px;
  }

  .macro-label { font-size: 13px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; color: var(--dim); }
  .macro-value { font-size: 28px; font-weight: 800; }
  .macro-target { font-size: 14px; color: var(--dim); font-weight: 400; }

  .progress-bar {
    height: 10px;
    background: var(--border);
    border-radius: 5px;
    overflow: hidden;
  }
  .progress-fill {
    height: 100%;
    border-radius: 5px;
    transition: width 0.4s ease;
  }
  .progress-protein { background: linear-gradient(90deg, #2563eb, #60a5fa); box-shadow: 0 0 12px var(--accent-glow); }
  .progress-protein.hit { background: linear-gradient(90deg, #16a34a, #4ade80); box-shadow: 0 0 12px var(--green-glow); }
  .progress-calorie { background: linear-gradient(90deg, #d97706, #fbbf24); }
  .progress-calorie.over { background: linear-gradient(90deg, #dc2626, #f87171); }

  .chips {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
    margin-top: 14px;
  }

  .chip {
    background: var(--card2);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 10px 12px;
    font-size: 13px;
    font-weight: 500;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .chip-value { font-size: 18px; font-weight: 800; }
  .chip-water .chip-value { color: #60a5fa; }
  .chip-coffee .chip-value { color: #a8a29e; }
  .chip-coors .chip-value { color: #fbbf24; }
  .chip-bourbon .chip-value { color: #f87171; }

  /* Workout chip in totals */
  .workout-chip {
    grid-column: 1 / -1;
    background: var(--card2);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 10px 12px;
    font-size: 13px;
    font-weight: 500;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .workout-chip .workout-status { font-weight: 700; }
  .workout-chip .workout-status.done { color: var(--green); }
  .workout-chip .workout-status.rest { color: var(--dim); }

  /* --- Day Navigation --- */
  .day-nav {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 10px;
  }
  .day-nav-btn {
    background: none;
    border: 1px solid var(--border);
    border-radius: 10px;
    color: var(--dim);
    font-size: 18px;
    width: 40px;
    height: 36px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .day-nav-btn:active { color: var(--accent); border-color: var(--accent); }
  .day-nav-btn:disabled { opacity: 0.2; }
  .day-nav-date {
    font-size: 14px;
    font-weight: 600;
    text-align: center;
  }
  .day-nav-sub {
    font-size: 11px;
    color: var(--dim);
    font-weight: 400;
  }
  .totals { transition: opacity 0.2s; }
  .totals.loading-day { opacity: 0.4; }

  /* --- Section Headers --- */
  h2 {
    font-size: 13px;
    font-weight: 700;
    margin: 24px 0 12px;
    color: var(--dim);
    text-transform: uppercase;
    letter-spacing: 1.5px;
  }

  /* --- Quick Tap Buttons --- */
  .quick-taps {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    margin-bottom: 8px;
  }

  .tap-btn {
    border: none;
    border-radius: 14px;
    padding: 20px 12px;
    font-size: 16px;
    font-weight: 700;
    cursor: pointer;
    color: #fff;
    position: relative;
    overflow: hidden;
    transition: transform 0.1s, box-shadow 0.2s;
    text-align: center;
    box-shadow: 0 4px 16px rgba(0,0,0,0.3);
  }
  .tap-btn:active { transform: scale(0.95); box-shadow: 0 2px 8px rgba(0,0,0,0.2); }
  .tap-btn:disabled { opacity: 0.5; }
  .tap-btn .sub { display: block; font-size: 11px; font-weight: 400; margin-top: 3px; opacity: 0.7; }

  .tap-coffee { background: var(--coffee-bg); }
  .tap-coors { background: var(--coors-bg); color: var(--coors-text); }
  .tap-coors .sub { color: var(--coors-text); opacity: 0.6; }
  .tap-bourbon { background: var(--bourbon-bg); }

  .water-group { display: flex; gap: 8px; }
  .water-group .tap-btn {
    flex: 1;
    background: var(--water-bg);
    padding: 20px 8px;
    font-size: 14px;
  }

  .tap-btn.flash::after {
    content: '';
    position: absolute;
    inset: 0;
    background: rgba(255,255,255,0.35);
    animation: flashOut 0.4s ease-out forwards;
  }
  @keyframes flashOut { to { opacity: 0; } }

  /* --- Collapsible Sections --- */
  .section-toggle {
    width: 100%;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 14px 16px;
    color: var(--text);
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    text-align: left;
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 0;
    box-shadow: 0 2px 12px rgba(0,0,0,0.2);
    transition: border-radius 0.2s;
  }
  .section-toggle .arrow {
    font-size: 12px;
    color: var(--dim);
    transition: transform 0.2s;
  }
  .section-toggle.open { border-radius: 14px 14px 0 0; }
  .section-toggle.open .arrow { transform: rotate(180deg); }

  .section-content {
    display: none;
    background: var(--card);
    border: 1px solid var(--border);
    border-top: none;
    border-radius: 0 0 14px 14px;
    padding: 12px 14px;
    margin-bottom: 10px;
  }
  .section-content.open { display: block; }

  /* --- Food Library --- */
  .food-card {
    background: var(--card2);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 12px 14px;
    margin-bottom: 8px;
  }
  .food-card:last-child { margin-bottom: 0; }

  .food-top {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 6px;
  }

  .food-name { font-size: 15px; font-weight: 600; flex: 1; }
  .food-serving { font-size: 11px; color: var(--dim); background: var(--border); padding: 3px 8px; border-radius: 6px; }
  .food-macros { font-size: 12px; color: var(--dim); margin-bottom: 10px; }

  .food-actions {
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .serving-btn {
    width: 36px;
    height: 36px;
    border-radius: 50%;
    border: 1px solid var(--border);
    background: var(--card);
    color: var(--text);
    font-size: 20px;
    font-weight: 600;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: background 0.15s;
  }
  .serving-btn:active { background: var(--accent); color: #fff; }

  .serving-count {
    font-size: 20px;
    font-weight: 800;
    width: 28px;
    text-align: center;
    color: var(--accent);
  }

  .log-food-btn {
    background: var(--green);
    color: #000;
    border: none;
    border-radius: 10px;
    padding: 10px 18px;
    font-size: 14px;
    font-weight: 700;
    cursor: pointer;
    margin-left: auto;
    box-shadow: 0 2px 8px var(--green-glow);
    transition: transform 0.1s;
  }
  .log-food-btn:active { transform: scale(0.95); }

  /* --- Add Food Form --- */
  .add-food-toggle {
    width: 100%;
    background: transparent;
    border: 1px dashed var(--border);
    border-radius: 12px;
    padding: 14px;
    color: var(--accent);
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    text-align: center;
    margin-top: 10px;
  }

  .add-food-form {
    background: var(--card2);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 16px;
    display: none;
    margin-top: 10px;
  }
  .add-food-form.open { display: block; }

  .form-row { display: flex; gap: 8px; margin-bottom: 8px; flex-wrap: wrap; }
  .form-field { display: flex; flex-direction: column; flex: 1; min-width: 0; }
  .form-field.full { flex-basis: 100%; }
  .form-field label { font-size: 11px; color: var(--dim); margin-bottom: 3px; text-transform: uppercase; letter-spacing: 0.5px; }
  .form-field input {
    background: var(--bg); border: 1px solid var(--border); border-radius: 10px;
    padding: 10px 12px; color: var(--text); font-size: 15px; width: 100%;
  }
  .form-field input:focus { outline: none; border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-glow); }

  .batch-toggle { display: flex; margin-bottom: 10px; border-radius: 10px; overflow: hidden; border: 1px solid var(--border); }
  .batch-toggle button { flex: 1; padding: 8px; border: none; background: var(--bg); color: var(--dim); font-size: 13px; font-weight: 600; cursor: pointer; }
  .batch-toggle button.active { background: var(--accent); color: #fff; }

  .save-food-btn {
    width: 100%; background: linear-gradient(135deg, #2563eb, #3b82f6); color: #fff;
    border: none; border-radius: 10px; padding: 12px; font-size: 15px; font-weight: 700;
    cursor: pointer; margin-top: 4px; box-shadow: 0 4px 12px var(--accent-glow);
  }
  .save-food-btn:active { transform: scale(0.97); }

  /* --- Today's Log --- */
  .log-entry {
    display: flex; justify-content: space-between; align-items: center;
    padding: 8px 0; border-bottom: 1px solid rgba(255,255,255,0.05); font-size: 13px;
  }
  .log-entry:last-child { border-bottom: none; }
  .log-entry .log-time { color: var(--dim); font-size: 12px; width: 55px; flex-shrink: 0; }
  .log-entry .log-item { flex: 1; }
  .log-entry .log-macros { color: var(--dim); text-align: right; font-size: 12px; }

  /* --- Weight Section --- */
  .weight-card {
    background: var(--card); border: 1px solid var(--border); border-radius: 14px;
    padding: 16px; margin-bottom: 10px; box-shadow: 0 2px 12px rgba(0,0,0,0.2);
  }
  .weight-entry { display: flex; align-items: center; gap: 10px; margin-bottom: 14px; }
  .weight-entry input {
    background: var(--bg); border: 1px solid var(--border); border-radius: 10px;
    padding: 10px 12px; color: var(--text); font-size: 18px; font-weight: 700;
    width: 100px; text-align: center;
  }
  .weight-entry input:focus { outline: none; border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-glow); }
  .weight-entry .unit { color: var(--dim); font-size: 14px; }
  .weight-save-btn {
    background: var(--accent); color: #fff; border: none; border-radius: 10px;
    padding: 10px 16px; font-size: 14px; font-weight: 700; cursor: pointer;
  }
  .weight-save-btn:active { transform: scale(0.95); }
  .weight-today { font-size: 13px; color: var(--green); margin-left: auto; }
  .weight-chart { width: 100%; height: 160px; display: block; }
  .weight-stats { display: flex; justify-content: space-around; margin-top: 12px; padding-top: 12px; border-top: 1px solid var(--border); }
  .weight-stat { text-align: center; }
  .weight-stat .stat-label { font-size: 11px; color: var(--dim); text-transform: uppercase; letter-spacing: 0.5px; }
  .weight-stat .stat-value { font-size: 18px; font-weight: 800; margin-top: 2px; }
  .weight-stat .stat-value.down { color: var(--green); }
  .weight-stat .stat-value.up { color: var(--red); }
  .weight-stat .stat-value.neutral { color: var(--dim); }

  /* --- Settings --- */
  .settings-btn {
    position: absolute;
    left: 16px;
    top: 14px;
    background: none;
    border: 1px solid var(--border);
    border-radius: 50%;
    width: 36px;
    height: 36px;
    color: var(--dim);
    font-size: 18px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .settings-btn:active { color: var(--accent); }

  .settings-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.7);
    z-index: 100;
    justify-content: center;
    align-items: center;
  }
  .settings-overlay.open { display: flex; }

  .settings-panel {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 24px 20px;
    width: 90%;
    max-width: 400px;
    max-height: 80vh;
    overflow-y: auto;
  }
  .settings-panel h3 {
    font-size: 18px;
    font-weight: 700;
    margin-bottom: 16px;
    text-align: center;
  }
  .settings-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 12px 0;
    border-bottom: 1px solid var(--border);
  }
  .settings-row:last-of-type { border-bottom: none; }
  .settings-row label { font-size: 14px; color: var(--dim); }
  .settings-row .hint { font-size: 11px; color: var(--dim); opacity: 0.7; }
  .settings-row input {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 8px 10px;
    color: var(--text);
    font-size: 16px;
    font-weight: 700;
    width: 90px;
    text-align: center;
  }
  .settings-row input:focus { outline: none; border-color: var(--accent); }

  .settings-save-btn {
    width: 100%;
    background: var(--accent);
    color: #fff;
    border: none;
    border-radius: 10px;
    padding: 12px;
    font-size: 15px;
    font-weight: 700;
    cursor: pointer;
    margin-top: 16px;
  }
  .settings-close-btn {
    width: 100%;
    background: none;
    border: 1px solid var(--border);
    color: var(--dim);
    border-radius: 10px;
    padding: 10px;
    font-size: 14px;
    cursor: pointer;
    margin-top: 8px;
  }

</style>
</head>
<body>

<div class="header">
  <h1>The Grind</h1>
  <div class="date" id="headerDate"></div>
  <button class="settings-btn" onclick="openSettings()" title="Settings">&#9881;</button>
  <button class="refresh-btn" onclick="hardRefresh()" title="Refresh">&#8635;</button>
</div>

<!-- Settings Overlay -->
<div class="settings-overlay" id="settingsOverlay" onclick="if(event.target===this)closeSettings()">
  <div class="settings-panel">
    <h3>Targets</h3>
    <div class="settings-row">
      <div><label>Protein</label><div class="hint">Goal to hit or exceed</div></div>
      <div><input type="number" id="setProt" inputmode="numeric"> <span style="color:var(--dim);font-size:13px">g</span></div>
    </div>
    <div class="settings-row">
      <div><label>Calories</label><div class="hint">Ceiling — stay under</div></div>
      <div><input type="number" id="setCal" inputmode="numeric"></div>
    </div>
    <div class="settings-row">
      <div><label>Water</label><div class="hint">Fill to target</div></div>
      <div><input type="number" id="setWater" inputmode="numeric"> <span style="color:var(--dim);font-size:13px">oz</span></div>
    </div>
    <button class="settings-save-btn" onclick="saveSettings()">Save</button>
    <button class="settings-close-btn" onclick="closeSettings()">Cancel</button>
  </div>
</div>

<div class="status-banner" id="statusBanner"></div>

<!-- Yesterday's Feedback -->
<div class="feedback-card" id="feedbackCard">
  <div class="feedback-title">Yesterday's Recap</div>
  <div id="feedbackContent"></div>
</div>

<!-- Day Navigation + Totals -->
<div class="day-nav">
  <button class="day-nav-btn" id="prevDay" onclick="changeDay(-1)">&#8249;</button>
  <div>
    <div class="day-nav-date" id="dayNavDate">Today</div>
    <div class="day-nav-sub" id="dayNavSub"></div>
  </div>
  <button class="day-nav-btn" id="nextDay" onclick="changeDay(1)" disabled>&#8250;</button>
</div>
<div class="totals" id="totalsCard">
  <div class="macro-row">
    <div class="macro-header">
      <span class="macro-label">Protein</span>
      <span><span class="macro-value" id="totalProtein">--</span><span class="macro-target"> / 190g</span></span>
    </div>
    <div class="progress-bar"><div class="progress-fill progress-protein" id="proteinBar" style="width:0%"></div></div>
  </div>
  <div class="macro-row">
    <div class="macro-header">
      <span class="macro-label">Calories</span>
      <span><span class="macro-value" id="totalCalories">--</span><span class="macro-target"> / 2,300</span></span>
    </div>
    <div class="progress-bar"><div class="progress-fill progress-calorie" id="calorieBar" style="width:0%"></div></div>
  </div>
  <div class="chips">
    <div class="chip chip-water"><span>Water</span><span class="chip-value" id="totalWater">0</span></div>
    <div class="chip chip-coffee"><span>Coffee</span><span class="chip-value" id="totalCoffee">0</span></div>
    <div class="chip chip-coors"><span>Coors</span><span class="chip-value" id="totalCoors">0</span></div>
    <div class="chip chip-bourbon"><span>Bourbon</span><span class="chip-value" id="totalBourbon">0</span></div>
    <div class="workout-chip">
      <span>Workout</span>
      <span class="workout-status rest" id="workoutStatus">Rest Day</span>
    </div>
  </div>
</div>

<!-- Quick Tap Liquid Buttons -->
<h2>Quick Log</h2>
<div class="quick-taps">
  <button class="tap-btn tap-coffee" onclick="tapLiquid('coffee', this)">Coffee<span class="sub">+1 cup / 75 cal</span></button>
  <div class="water-group">
    <button class="tap-btn" onclick="tapLiquid('water', this, 12)">Water<span class="sub">12 oz</span></button>
    <button class="tap-btn" onclick="tapLiquid('water', this, 24)">Water<span class="sub">24 oz</span></button>
  </div>
  <button class="tap-btn tap-coors" onclick="tapLiquid('coors', this)">Coors<span class="sub">+1 / 102 cal</span></button>

<script>
const API = 'https://script.google.com/macros/s/AKfycbzEcwU-CfMajZdxUVN2a823tPG85IOjhTK7_akWmkJ7oGvOM1Jt6RvbI2-RMwykECu_XQ/exec';

let foodsCache = [];
let isBatchMode = false;

// ---- Targets (editable, stored in localStorage) ----
const DEFAULT_TARGETS = { protein: 190, calories: 2300, water: 128 };
function getTargets() {
  const raw = localStorage.getItem('grind_targets');
  return raw ? JSON.parse(raw) : { ...DEFAULT_TARGETS };
}
function saveTargetsToStorage(t) { localStorage.setItem('grind_targets', JSON.stringify(t)); }
let targets = getTargets();

function openSettings() {
  document.getElementById('setProt').value = targets.protein;
  document.getElementById('setCal').value = targets.calories;
  document.getElementById('setWater').value = targets.water;
  document.getElementById('settingsOverlay').classList.add('open');
}
function closeSettings() { document.getElementById('settingsOverlay').classList.remove('open'); }
function saveSettings() {
  targets.protein = parseInt(document.getElementById('setProt').value) || DEFAULT_TARGETS.protein;
  targets.calories = parseInt(document.getElementById('setCal').value) || DEFAULT_TARGETS.calories;
  targets.water = parseInt(document.getElementById('setWater').value) || DEFAULT_TARGETS.water;
  saveTargetsToStorage(targets);
  updateTargetLabels();
  closeSettings();
  location.reload(true);
}
function updateTargetLabels() {
  document.querySelector('#totalProtein + .macro-target').textContent = ' / ' + targets.protein + 'g';
  document.querySelector('#totalCalories + .macro-target').textContent = ' / ' + targets.calories.toLocaleString();
}

document.getElementById('headerDate').textContent = new Date().toLocaleDateString('en-US', {
  weekday: 'long', month: 'long', day: 'numeric', year: 'numeric'
});

// ---- API Helpers ----
async function apiGet(action) {
  const res = await fetch(API + '?action=' + action);
  return res.json();
}

async function apiPost(body) {
  const res = await fetch(API, {
    method: 'POST',
    headers: { 'Content-Type': 'text/plain;charset=utf-8' },
    body: JSON.stringify(body)
  });
  return res.json();
}

function showStatus(msg, type) {
  const el = document.getElementById('statusBanner');
  el.textContent = msg;
  el.className = 'status-banner ' + type;
  if (type === 'success') setTimeout(() => { el.className = 'status-banner'; }, 2000);
}

// ---- Collapsible Sections ----
function toggleSection(name) {
  document.getElementById(name + 'Toggle').classList.toggle('open');
  document.getElementById(name + 'Section').classList.toggle('open');
}

// ---- Load Data ----
async function loadAll() {
  try {
    showStatus('Loading...', 'loading');
    const [foods, totals, log, yesterday] = await Promise.all([
      apiGet('getFoods'),
      apiGet('getToday'),
      apiGet('getTodayLog'),
      apiGet('getYesterday')
    ]);
    foodsCache = foods;
    renderTotals(totals);
    renderFoods(foods);
    renderLog(log);
    renderFeedback(yesterday);
    loadWeightData();
    document.getElementById('statusBanner').className = 'status-banner';
  } catch (err) {
    showStatus('Failed to connect. Check your internet.', 'error');
    console.error(err);
  }
}

// ---- Yesterday's Feedback ----
function renderFeedback(y) {
  const card = document.getElementById('feedbackCard');
  const content = document.getElementById('feedbackContent');
  if (!y.hasData) return;

  const tips = [];
  const proteinTarget = targets.protein;
  const calorieTarget = targets.calories;
  const waterTarget = targets.water;

  // Protein
  const proteinGap = proteinTarget - y.protein;
  if (y.protein >= proteinTarget) {
    tips.push({ icon: '+', text: 'You hit your protein goal (' + y.protein + 'g). Keep it up.' });
  } else if (proteinGap <= 30) {
    tips.push({ icon: '!', text: 'You were ' + proteinGap + 'g short on protein (' + y.protein + 'g). A protein shake or Greek yogurt would close that gap.' });
  } else {
    tips.push({ icon: '!', text: 'Protein was ' + y.protein + 'g — ' + proteinGap + 'g under target. Add cottage cheese, a protein bar, or an extra serving of meat today.' });
  }

  // Calories
  const calorieDiff = y.calories - calorieTarget;
  if (calorieDiff > 300) {
    tips.push({ icon: '!', text: 'Calories were ' + calorieDiff + ' over target (' + y.calories.toLocaleString() + '). Watch portion sizes or cut a snack today.' });
  } else if (calorieDiff > 0) {
    tips.push({ icon: '-', text: 'Slightly over on calories (' + y.calories.toLocaleString() + '). Not a big deal — stay on track today.' });
  } else if (calorieDiff < -500) {
    tips.push({ icon: '!', text: 'Only ' + y.calories.toLocaleString() + ' calories yesterday — too low. Under-eating slows your metabolism. Aim for ' + calorieTarget.toLocaleString() + '.' });
  } else {
    tips.push({ icon: '+', text: 'Calories on point at ' + y.calories.toLocaleString() + '.' });
  }

  // Water
  if (y.waterOz >= waterTarget) {
    tips.push({ icon: '+', text: 'Crushed your water goal: ' + y.waterOz + ' oz.' });
  } else if (y.waterOz >= 96) {
    tips.push({ icon: '-', text: 'Water was ' + y.waterOz + ' oz — close but try to hit 128 oz today.' });
  } else if (y.waterOz > 0) {
    tips.push({ icon: '!', text: 'Only ' + y.waterOz + ' oz of water. You need at least a gallon. Start drinking early today.' });
  }

  // Alcohol
  const totalDrinks = y.coorsCount + y.bourbonCount;
  const drinkCals = (y.coorsCount * 102) + (y.bourbonCount * 97);
  if (totalDrinks > 3) {
    tips.push({ icon: '!', text: totalDrinks + ' drinks = ' + drinkCals + ' empty calories. That adds up fast.' });
  } else if (totalDrinks > 0) {
    tips.push({ icon: '-', text: totalDrinks + ' drink' + (totalDrinks > 1 ? 's' : '') + ' (' + drinkCals + ' cal). Factored in.' });
  }

  content.innerHTML = tips.map(t => {
    const color = t.icon === '+' ? 'var(--green)' : t.icon === '!' ? 'var(--orange)' : 'var(--dim)';
    return '<div class="feedback-item"><span class="feedback-icon" style="color:' + color + '">' +
      (t.icon === '+' ? '&#10003;' : t.icon === '!' ? '&#9888;' : '&#8226;') +
      '</span>' + t.text + '</div>';
  }).join('');

  card.classList.add('show');
}

// ---- Quick Tap Liquids ----
async function tapLiquid(type, btn, amount) {
  btn.classList.remove('flash');
  void btn.offsetWidth;
  btn.classList.add('flash');
  btn.disabled = true;
  try {
    await apiPost({ action: 'logLiquid', type: type, amount: amount || 1 });
    await refreshTotalsAndLog();
  } catch (err) {
    showStatus('Failed to log ' + type, 'error');
  } finally {
    btn.disabled = false;
  }
}

// ---- Log Food ----
async function logFood(foodId) {
  const food = foodsCache.find(f => f.id === foodId);
  if (!food) return;
  const servingsEl = document.getElementById('srv-' + foodId);
  const servings = parseInt(servingsEl.textContent);
  const logBtn = servingsEl.closest('.food-card').querySelector('.log-food-btn');
  logBtn.disabled = true;
  logBtn.textContent = '...';
  try {
    await apiPost({ action: 'logFood', foodId: foodId, servings: servings });
    servingsEl.textContent = '1';
    await refreshTotalsAndLog();
    showStatus('Logged ' + food.name + (servings > 1 ? ' x' + servings : ''), 'success');
  } catch (err) {
    showStatus('Failed to log food', 'error');
  } finally {
    logBtn.disabled = false;
    logBtn.textContent = 'Log';
  }
}

function adjustServing(foodId, delta) {
  const el = document.getElementById('srv-' + foodId);
  let val = parseInt(el.textContent) + delta;
  if (val < 1) val = 1;
  if (val > 10) val = 10;
  el.textContent = val;
}

// ---- Add New Food ----
function toggleAddFood() { document.getElementById('addFoodForm').classList.toggle('open'); }

function setBatchMode(batch, btn) {
  isBatchMode = batch;
  btn.parentElement.querySelectorAll('button').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
}

async function saveNewFood() {
  const name = document.getElementById('newFoodName').value.trim();
  if (!name) { alert('Enter a food name.'); return; }
  const body = {
    action: 'addFood', name: name,
    servingLabel: document.getElementById('newServingLabel').value.trim() || '1 serving',
    containers: parseInt(document.getElementById('newContainers').value) || 1,
    isBatch: isBatchMode,
    protein: parseFloat(document.getElementById('newProtein').value) || 0,
    calories: parseFloat(document.getElementById('newCalories').value) || 0,
    carbs: parseFloat(document.getElementById('newCarbs').value) || 0,
    fat: parseFloat(document.getElementById('newFat').value) || 0,
    sugar: parseFloat(document.getElementById('newSugar').value) || 0,
    sodium: parseFloat(document.getElementById('newSodium').value) || 0
  };
  const saveBtn = document.querySelector('.save-food-btn');
  saveBtn.disabled = true; saveBtn.textContent = 'Saving...';
  try {
    const result = await apiPost(body);
    if (result.success) {
      foodsCache.push(result.food);
      renderFoods(foodsCache);
      ['newFoodName','newProtein','newCalories','newCarbs','newFat','newSugar','newSodium'].forEach(id => document.getElementById(id).value = '');
      document.getElementById('newContainers').value = '1';
      document.getElementById('addFoodForm').classList.remove('open');
      showStatus('Added ' + name + ' to library', 'success');
    }
  } catch (err) {
    showStatus('Failed to save food', 'error');
  } finally {
    saveBtn.disabled = false; saveBtn.textContent = 'Save to Library';
  }
}

// ---- Refresh ----
async function refreshTotalsAndLog() {
  try {
    const [totals, log] = await Promise.all([apiGet('getToday'), apiGet('getTodayLog')]);
    renderTotals(totals);
    renderLog(log);
  } catch (err) { console.error('Refresh failed:', err); }
}

// ---- Rendering ----
function renderTotals(t) {
  document.getElementById('totalProtein').textContent = t.protein + 'g';
  document.getElementById('totalCalories').textContent = t.calories.toLocaleString();
  document.getElementById('totalWater').textContent = t.waterOz + ' oz';
  document.getElementById('totalCoffee').textContent = t.coffeeCount;
  document.getElementById('totalCoors').textContent = t.coorsCount;
  document.getElementById('totalBourbon').textContent = t.bourbonCount;

  document.getElementById('proteinBar').style.width = Math.min(100, (t.protein / targets.protein) * 100) + '%';
  document.getElementById('calorieBar').style.width = Math.min(100, (t.calories / targets.calories) * 100) + '%';
  document.getElementById('proteinBar').className = 'progress-fill progress-protein' + (t.protein >= targets.protein ? ' hit' : '');
  document.getElementById('calorieBar').className = 'progress-fill progress-calorie' + (t.calories > targets.calories ? ' over' : '');
}

function renderFoods(foods) {
  const container = document.getElementById('foodList');
  if (!foods.length) { container.innerHTML = '<div style="color:var(--dim);text-align:center;padding:12px 0;font-size:14px;">No foods yet.</div>'; return; }
  const filtered = foods.filter(f => f.id !== 'f006');
  container.innerHTML = filtered.map(f => `
    <div class="food-card">
      <div class="food-top">
        <span class="food-name">${f.name}</span>
        <span class="food-serving">${f.servingLabel}</span>
      </div>
      <div class="food-macros">${f.protein}p / ${f.calories}cal / ${f.carbs}c / ${f.fat}f</div>
      <div class="food-actions">
        <button class="serving-btn" onclick="adjustServing('${f.id}',-1)">-</button>
        <span class="serving-count" id="srv-${f.id}">1</span>
        <button class="serving-btn" onclick="adjustServing('${f.id}',1)">+</button>
        <button class="log-food-btn" onclick="logFood('${f.id}')">Log</button>
      </div>
    </div>
  `).join('');
}

function renderLog(entries) {
  const container = document.getElementById('todayLog');
  if (!entries || !entries.length) {
    container.innerHTML = '<div style="color:var(--dim);text-align:center;padding:12px 0;font-size:14px;">Nothing logged yet today.</div>';
    return;
  }
  container.innerHTML = entries.slice().reverse().map(e => {
    const time = new Date(e.timestamp).toLocaleTimeString('en-US', { hour:'numeric', minute:'2-digit' });
    const macros = e.calories ? `${e.protein}p / ${e.calories}cal` : '';
    return `<div class="log-entry"><span class="log-time">${time}</span><span class="log-item">${e.item}</span><span class="log-macros">${macros}</span></div>`;
  }).join('');
}

// ---- Bodyweight ----
async function saveWeight() {
  const input = document.getElementById('weightInput');
  const weight = parseFloat(input.value);
  if (!weight || weight < 50 || weight > 500) { alert('Enter a valid weight.'); return; }
  const btn = document.getElementById('weightSaveBtn');
  btn.disabled = true; btn.textContent = '...';
  try {
    const result = await apiPost({ action: 'logBodyweight', weight: weight });
    if (result.success) {
      showStatus('Logged ' + weight + ' lbs', 'success');
      await loadWeightData();
    }
  } catch (err) { showStatus('Failed to log weight', 'error'); }
  finally { btn.disabled = false; btn.textContent = 'Log'; }
}

async function loadWeightData() {
  try {
    const history = await apiGet('getWeightHistory');
    renderWeightChart(history);
    renderWeightStats(history);
    // Pre-fill input with last known weight
    if (history.length > 0) {
      document.getElementById('weightInput').value = history[history.length - 1].weight;
    }
  } catch (err) { console.error('Weight load failed:', err); }
}

function renderWeightChart(history) {
  const canvas = document.getElementById('weightChart');
  const ctx = canvas.getContext('2d');
  const dpr = window.devicePixelRatio || 1;
  const rect = canvas.getBoundingClientRect();
  canvas.width = rect.width * dpr;
  canvas.height = rect.height * dpr;
  ctx.scale(dpr, dpr);
  const W = rect.width, H = rect.height;
  ctx.clearRect(0, 0, W, H);

  if (history.length === 0) {
    ctx.fillStyle = '#6b7a99'; ctx.font = '14px -apple-system, sans-serif'; ctx.textAlign = 'center';
    ctx.fillText('Log your weight to see the trend', W / 2, H / 2);
    return;
  }

  const todayStr = new Date().toLocaleDateString('en-CA');
  const todayEntry = history.find(h => h.date === todayStr);
  document.getElementById('weightToday').textContent = todayEntry ? todayEntry.weight + ' lbs today' : '';

  if (history.length === 1) {
    ctx.fillStyle = '#6b7a99'; ctx.font = '14px -apple-system, sans-serif'; ctx.textAlign = 'center';
    ctx.fillText(history[0].weight + ' lbs — more data points coming', W / 2, H / 2);
    return;
  }

  const pad = { top: 20, right: 16, bottom: 30, left: 44 };
  const chartW = W - pad.left - pad.right, chartH = H - pad.top - pad.bottom;
  const weights = history.map(h => h.weight);
  const minW = Math.floor(Math.min(...weights) - 2), maxW = Math.ceil(Math.max(...weights) + 2);
  const range = maxW - minW || 1;
  function x(i) { return pad.left + (i / (history.length - 1)) * chartW; }
  function y(w) { return pad.top + chartH - ((w - minW) / range) * chartH; }

  ctx.strokeStyle = '#1e2d4a'; ctx.lineWidth = 1;
  for (let i = 0; i <= 4; i++) {
    const val = minW + (range * i / 4), yPos = y(val);
    ctx.beginPath(); ctx.moveTo(pad.left, yPos); ctx.lineTo(W - pad.right, yPos); ctx.stroke();
    ctx.fillStyle = '#6b7a99'; ctx.font = '11px -apple-system, sans-serif'; ctx.textAlign = 'right';
    ctx.fillText(Math.round(val), pad.left - 6, yPos + 4);
  }

  ctx.fillStyle = '#6b7a99'; ctx.font = '10px -apple-system, sans-serif'; ctx.textAlign = 'center';
  const lc = Math.min(history.length, 6);
  for (let i = 0; i < lc; i++) {
    const idx = Math.round(i * (history.length - 1) / (lc - 1));
    ctx.fillText(history[idx].date.slice(5), x(idx), H - 6);
  }

  const grad = ctx.createLinearGradient(0, pad.top, 0, pad.top + chartH);
  grad.addColorStop(0, 'rgba(59,130,246,0.3)'); grad.addColorStop(1, 'rgba(59,130,246,0)');
  ctx.beginPath(); ctx.moveTo(x(0), y(history[0].weight));
  for (let i = 1; i < history.length; i++) ctx.lineTo(x(i), y(history[i].weight));
  ctx.lineTo(x(history.length - 1), pad.top + chartH); ctx.lineTo(x(0), pad.top + chartH);
  ctx.closePath(); ctx.fillStyle = grad; ctx.fill();

  ctx.beginPath(); ctx.moveTo(x(0), y(history[0].weight));
  for (let i = 1; i < history.length; i++) ctx.lineTo(x(i), y(history[i].weight));
  ctx.strokeStyle = '#3b82f6'; ctx.lineWidth = 2.5; ctx.lineJoin = 'round'; ctx.stroke();

  history.forEach((h, i) => {
    ctx.beginPath(); ctx.arc(x(i), y(h.weight), 4, 0, Math.PI * 2);
    ctx.fillStyle = '#3b82f6'; ctx.fill(); ctx.strokeStyle = '#0b1120'; ctx.lineWidth = 2; ctx.stroke();
  });
  const last = history.length - 1;
  ctx.beginPath(); ctx.arc(x(last), y(history[last].weight), 6, 0, Math.PI * 2);
  ctx.fillStyle = '#60a5fa'; ctx.fill(); ctx.strokeStyle = '#0b1120'; ctx.lineWidth = 2; ctx.stroke();
}

function renderWeightStats(history) {
  const container = document.getElementById('weightStats');
  if (!history.length) { container.innerHTML = ''; return; }
  const start = history[0].weight, current = history[history.length - 1].weight;
  const change = current - start;
  const cc = change < 0 ? 'down' : change > 0 ? 'up' : 'neutral';
  let weekChange = '--', wc2 = 'neutral';
  if (history.length >= 2) {
    const d = new Date(); d.setDate(d.getDate() - 7);
    const ws = d.toLocaleDateString('en-CA');
    const we = history.find(h => h.date <= ws) || history[0];
    const wc = current - we.weight;
    wc2 = wc < 0 ? 'down' : wc > 0 ? 'up' : 'neutral';
    weekChange = (wc > 0 ? '+' : '') + wc.toFixed(1);
  }
  container.innerHTML = `
    <div class="weight-stat"><div class="stat-label">Start</div><div class="stat-value neutral">${start}</div></div>
    <div class="weight-stat"><div class="stat-label">Current</div><div class="stat-value">${current}</div></div>
    <div class="weight-stat"><div class="stat-label">Total</div><div class="stat-value ${cc}">${change > 0 ? '+' : ''}${change.toFixed(1)}</div></div>
    <div class="weight-stat"><div class="stat-label">7-Day</div><div class="stat-value ${wc2}">${weekChange}</div></div>`;
}

// ---- Trends ----
async function loadTrendsData() {
  try {
    const history = await apiGet('getSummaryHistory');
    renderTrends(history);
  } catch (err) { console.error('Trends load failed:', err); }
}

function renderTrends(history) {
  const container = document.getElementById('trendsList');
  if (!history.length) {
    container.innerHTML = '<div style="color:var(--dim);text-align:center;padding:12px 0;font-size:14px;">No history yet. Keep logging!</div>';
    return;
  }

  const today = new Date().toLocaleDateString('en-CA');
  const past = history.filter(h => h.date < today).slice(-7);
  const n = past.length;

  if (n === 0) {
    container.innerHTML = '<div style="color:var(--dim);text-align:center;padding:12px 0;font-size:14px;">Complete a full day of logging to see trends.</div>';
    return;
  }

  const avgProtein  = Math.round(past.reduce((s, h) => s + h.protein, 0) / n);
  const avgCalories = Math.round(past.reduce((s, h) => s + h.calories, 0) / n);
  const avgWater    = Math.round(past.reduce((s, h) => s + h.waterOz, 0) / n);

  const proteinHits = past.filter(h => h.protein >= targets.protein).length;
  const hitRatePct  = Math.round((proteinHits / n) * 100);

  const sorted = [...past].reverse();
  let streak = 0;
  for (const h of sorted) {
    if (h.protein >= targets.protein) streak++;
    else break;
  }

  const totalDrinks = past.reduce((s, h) => s + h.coorsCount + h.bourbonCount, 0);
  const drinkCals   = past.reduce((s, h) => s + (h.coorsCount * 102) + (h.bourbonCount * 97), 0);
  const workoutDays = past.filter(h => h.workoutDone === 'Yes').length;

  const label = n < 7 ? n + '-day avg' : '7-day avg';

  const proteinColor  = avgProtein >= targets.protein ? 'hit' : avgProtein >= targets.protein * 0.8 ? 'warn' : 'miss';
  const calorieColor  = avgCalories <= targets.calories ? 'hit' : avgCalories <= targets.calories * 1.1 ? 'warn' : 'miss';
  const hitColor      = hitRatePct >= 80 ? 'hit' : hitRatePct >= 50 ? 'warn' : 'miss';
  const streakColor   = streak >= 3 ? 'hit' : streak >= 1 ? 'warn' : 'miss';
  const waterColor    = avgWater >= targets.water ? 'hit' : avgWater >= targets.water * 0.75 ? 'warn' : 'miss';
  const drinkColor    = totalDrinks === 0 ? 'hit' : totalDrinks <= n ? 'warn' : 'miss';

  container.innerHTML = `
    <div class="trends-grid">
      <div class="trend-stat">
        <div class="trend-label">Protein ${label}</div>
        <div class="trend-value ${proteinColor}">${avgProtein}g</div>
        <div class="trend-sub">Goal: ${targets.protein}g</div>
        <div class="trend-mini-bar"><div class="trend-mini-fill ${avgProtein >= targets.protein ? 'hit' : ''}" style="width:${Math.min(100,(avgProtein/targets.protein)*100)}%"></div></div>
      </div>
      <div class="trend-stat">
        <div class="trend-label">Calorie ${label}</div>
        <div class="trend-value ${calorieColor}">${avgCalories.toLocaleString()}</div>
        <div class="trend-sub">Target: ${targets.calories.toLocaleString()}</div>
        <div class="trend-mini-bar"><div class="trend-mini-fill ${avgCalories > targets.calories ? 'over' : avgCalories >= targets.calories * 0.9 ? 'hit' : ''}" style="width:${Math.min(100,(avgCalories/targets.calories)*100)}%"></div></div>
      </div>
      <div class="trend-stat">
        <div class="trend-label">Protein Hit Rate</div>
        <div class="trend-value ${hitColor}">${proteinHits}/${n}</div>
        <div class="trend-sub">${hitRatePct}% of days on target</div>
      </div>
      <div class="trend-stat">
        <div class="trend-label">Current Streak</div>
        <div class="trend-value ${streakColor}">${streak} ${streak === 1 ? 'day' : 'days'}</div>
        <div class="trend-sub">${streak > 0 ? 'Consecutive protein days' : 'Hit your goal to start'}</div>
      </div>
      <div class="trend-stat">
        <div class="trend-label">Avg Water</div>
        <div class="trend-value ${waterColor}">${avgWater} oz</div>
        <div class="trend-sub">Target: ${targets.water} oz/day</div>
      </div>
      <div class="trend-stat">
        <div class="trend-label">Drinks (${n}d)</div>
        <div class="trend-value ${drinkColor}">${totalDrinks}</div>
        <div class="trend-sub">${drinkCals} empty cal total</div>
      </div>
      <div class="trend-stat">
        <div class="trend-label">Workouts (${n}d)</div>
        <div class="trend-value ${workoutDays > 0 ? 'hit' : 'miss'}">${workoutDays}</div>
        <div class="trend-sub">of ${n} days tracked</div>
      </div>
    </div>`;
}

// ---- Recipe Builder ----
function openRecipeBuilder() {
  window.location.href = 'recipe.html';
}

// ---- Hard Refresh (cache bust) ----
function hardRefresh() {
  if ('caches' in window) {
    caches.keys().then(names => names.forEach(name => caches.delete(name)));
  }
  window.location.href = window.location.pathname + '?t=' + Date.now();
}

// ---- Day Navigation ----
let viewDate = new Date();
let viewOffset = 0;

function todayStr() { return new Date().toLocaleDateString('en-CA'); }

function getViewDateStr() {
  const d = new Date();
  d.setDate(d.getDate() + viewOffset);
  return d.toLocaleDateString('en-CA');
}

function updateDayNav() {
  const dateStr = getViewDateStr();
  const d = new Date();
  d.setDate(d.getDate() + viewOffset);

  if (viewOffset === 0) {
    document.getElementById('dayNavDate').textContent = 'Today';
  } else if (viewOffset === -1) {
    document.getElementById('dayNavDate').textContent = 'Yesterday';
  } else {
    document.getElementById('dayNavDate').textContent = d.toLocaleDateString('en-US', { weekday: 'short', month: 'short', day: 'numeric' });
  }
  document.getElementById('dayNavSub').textContent = dateStr;
  document.getElementById('nextDay').disabled = (viewOffset >= 0);
}

async function changeDay(delta) {
  viewOffset += delta;
  updateDayNav();

  const card = document.getElementById('totalsCard');
  card.classList.add('loading-day');

  try {
    const dateStr = getViewDateStr();
    const data = await apiGet('getDaySummary&date=' + dateStr);
    renderTotals(data.totals);
    renderLog(data.log);
  } catch (err) {
    console.error('Day load failed:', err);
  } finally {
    card.classList.remove('loading-day');
  }
}

// Swipe detection on totals card
(function() {
  let startX = 0, startY = 0;
  const el = document.querySelector('.totals');
  el.addEventListener('touchstart', e => {
    startX = e.touches[0].clientX;
    startY = e.touches[0].clientY;
  }, { passive: true });
  el.addEventListener('touchend', e => {
    const dx = e.changedTouches[0].clientX - startX;
    const dy = e.changedTouches[0].clientY - startY;
    if (Math.abs(dx) > 60 && Math.abs(dx) > Math.abs(dy) * 1.5) {
      if (dx > 0) changeDay(-1); // swipe right = previous day
      else if (viewOffset < 0) changeDay(1); // swipe left = next day
    }
  }, { passive: true });
})();

// ---- Init ----
updateTargetLabels();
updateDayNav();
loadAll();
</script>
